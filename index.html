// ── EXTRACT STATE FROM ADDRESS ────────────────────────────
function getState(address) {
  if (!address) return 'Unknown';
  // Try "City ST, ZIPCODE" pattern
  const m = address.match(/,\s*([A-Z]{2})[,\s]/);
  if (m) return m[1];
  // Try end of string
  const m2 = address.match(/\b([A-Z]{2})\s*\d{5}/);
  if (m2) return m2[1];
  // Try two-letter state at end
  const m3 = address.match(/\b([A-Z]{2})\s*$/);
  if (m3) return m3[1];
  return 'Unknown';
}

function getMonthKey(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function getMonthLabel(key) {
  if (!key) return '—';
  const [y, m] = key.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + y.slice(2);
}

// ── RENDER STATS PAGE ─────────────────────────────────────
function renderStats() {
  if (!deals.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No deals loaded</div><div class="empty-sub">Import a CSV to see portfolio stats.</div></div>';
    return;
  }

  const all = deals.map(d => ({ d, c: compute(d) }));
  const n = all.length;

  // ── PORTFOLIO AVERAGES ────────────────────────────────────
  const avg = arr => arr.reduce((a,b) => a+b, 0) / arr.length;
  const sum = arr => arr.reduce((a,b) => a+b, 0);
  const profits    = all.map(x => x.c.profit);
  const revenues   = all.map(x => x.c.totRev);
  const costs      = all.map(x => x.c.totCost);
  const margins    = all.map(x => x.c.margin);
  const yields     = all.map(x => x.c.aYield);
  const holdDays   = all.map(x => x.c.totalDays).filter(v => v > 0);
  const dSpreads   = all.map(x => x.c.dSpread);
  const loans      = all.map(x => x.c.loan);

  const avgProfit  = avg(profits);
  const avgRev     = avg(revenues);
  const avgCost    = avg(costs);
  const avgMargin  = avg(margins);
  const avgYield   = avg(yields.filter(y => isFinite(y)));
  const avgHold    = holdDays.length ? avg(holdDays) : 0;
  const avgDSpread = avg(dSpreads);
  const avgLoan    = avg(loans);
  const totalProfit = sum(profits);
  const totalRev   = sum(revenues);

  const best  = all.reduce((a,b) => b.c.profit > a.c.profit ? b : a);
  const worst = all.reduce((a,b) => b.c.profit < a.c.profit ? b : a);
  const fastest = all.filter(x => x.c.totalDays > 0).reduce((a,b) => b.c.totalDays < a.c.totalDays ? b : a);
  const highestYield = all.filter(x => isFinite(x.c.aYield)).reduce((a,b) => b.c.aYield > a.c.aYield ? b : a);
  const profitCount = profits.filter(p => p > 0).length;

  // ── MONTHLY TRENDS (by Cash Purchase Date) ────────────────
  const monthMap = {};
  all.forEach(x => {
    const mk = getMonthKey(x.d.purchaseDate);
    if (!mk) return;
    if (!monthMap[mk]) monthMap[mk] = { deals:0, profit:0, revenue:0, cost:0, margin:[], hold:[], yield:[], dSpread:[] };
    monthMap[mk].deals++;
    monthMap[mk].profit += x.c.profit;
    monthMap[mk].revenue += x.c.totRev;
    monthMap[mk].cost += x.c.totCost;
    monthMap[mk].margin.push(x.c.margin);
    if (x.c.totalDays > 0) monthMap[mk].hold.push(x.c.totalDays);
    if (isFinite(x.c.aYield)) monthMap[mk].yield.push(x.c.aYield);
    if (x.c.totalDays > 0 && isFinite(x.c.dSpread)) monthMap[mk].dSpread.push(x.c.dSpread);
  });
  const months = Object.keys(monthMap).sort();

  // ── STATE STATS ───────────────────────────────────────────
  const stateMap = {};
  all.forEach(x => {
    const st = getState(x.d.address);
    if (!stateMap[st]) stateMap[st] = { deals:0, profit:0, revenue:0, cost:0, hold:[] };
    stateMap[st].deals++;
    stateMap[st].profit += x.c.profit;
    stateMap[st].revenue += x.c.totRev;
    stateMap[st].cost += x.c.totCost;
    if (x.c.totalDays > 0) stateMap[st].hold.push(x.c.totalDays);
  });
  const states = Object.keys(stateMap).sort((a,b) => stateMap[b].profit/stateMap[b].deals - stateMap[a].profit/stateMap[a].deals);

  // ── PROGRAM TYPE STATS ────────────────────────────────────
  const programMap = {};
  all.forEach(x => {
    const prog = (x.d.dealName.split(' - ')[0] || 'Unknown').trim();
    if (!programMap[prog]) programMap[prog] = { deals:0, profit:0, revenue:0, hold:[] };
    programMap[prog].deals++;
    programMap[prog].profit += x.c.profit;
    programMap[prog].revenue += x.c.totRev;
    if (x.c.totalDays > 0) programMap[prog].hold.push(x.c.totalDays);
  });
  const programs = Object.keys(programMap).sort((a,b) => programMap[b].profit/programMap[b].deals - programMap[a].profit/programMap[a].deals);

  // ── LOAN SIZE BUCKETS ─────────────────────────────────────
  const buckets = { '<$300k':[], '$300k–$500k':[], '$500k–$800k':[], '$800k–$1.2M':[], '>$1.2M':[] };
  all.forEach(x => {
    const l = x.c.loan;
    if (l < 300000) buckets['<$300k'].push(x.c.profit);
    else if (l < 500000) buckets['$300k–$500k'].push(x.c.profit);
    else if (l < 800000) buckets['$500k–$800k'].push(x.c.profit);
    else if (l < 1200000) buckets['$800k–$1.2M'].push(x.c.profit);
    else buckets['>$1.2M'].push(x.c.profit);
  });

  // ── HOLD PERIOD BUCKETS ───────────────────────────────────
  const holdBuckets = { '<30d':[], '30–60d':[], '60–90d':[], '90–120d':[], '>120d':[] };
  all.forEach(x => {
    const h = x.c.totalDays;
    if (!h) return;
    if (h < 30) holdBuckets['<30d'].push(x.c.profit);
    else if (h < 60) holdBuckets['30–60d'].push(x.c.profit);
    else if (h < 90) holdBuckets['60–90d'].push(x.c.profit);
    else if (h < 120) holdBuckets['90–120d'].push(x.c.profit);
    else holdBuckets['>120d'].push(x.c.profit);
  });

  // ── HELPERS for bar charts ────────────────────────────────
  const barChart = (items, maxVal, colorFn, labelWidth='90px') => {
    return items.map(([label, val]) => {
      const pct = maxVal > 0 ? Math.max(0, (val/maxVal)*100) : 0;
      const color = colorFn(val);
      const showVal = fmt(val);
      return `<div class="bar-row">
        <div class="bar-row-label" style="width:${labelWidth}">${label}</div>
        <div class="bar-outer">
          <div class="bar-inner" style="width:${pct}%;background:${color}">${pct>15?showVal:''}</div>
        </div>
        <div class="bar-val">${pct<=15?showVal:''}</div>
      </div>`;
    }).join('');
  };

  const profitColor = v => v > 0 ? '#059669' : '#e8441a';

  // Monthly profit bars
  const mProfits = months.map(mk => [getMonthLabel(mk), monthMap[mk].profit]);
  const maxMP = Math.max(...mProfits.map(x => Math.abs(x[1])), 1);

  // State bars
  const sBars = states.map(st => [st, stateMap[st].profit / stateMap[st].deals]);
  const maxSP = Math.max(...sBars.map(x => Math.abs(x[1])), 1);

  // Program bars
  const pBars = programs.map(p => [p.length > 18 ? p.slice(0,16)+'…' : p, programMap[p].profit / programMap[p].deals]);
  const maxPP = Math.max(...pBars.map(x => Math.abs(x[1])), 1);

  // Loan bucket bars
  const lBars = Object.entries(buckets).map(([k,v]) => [k, v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0]);
  const maxLB = Math.max(...lBars.map(x => Math.abs(x[1])), 1);

  // Hold bucket bars
  const hBars = Object.entries(holdBuckets).map(([k,v]) => [k, v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0]);
  const maxHB = Math.max(...hBars.map(x => Math.abs(x[1])), 1);

  // Monthly trend table
  const monthTrendRows = months.map(mk => {
    const m = monthMap[mk];
    const ap = m.profit / m.deals;
    const am = m.margin.reduce((a,b)=>a+b,0)/m.margin.length;
    const ah = m.hold.length ? m.hold.reduce((a,b)=>a+b,0)/m.hold.length : 0;
    const ay = m.yield.length ? m.yield.reduce((a,b)=>a+b,0)/m.yield.length : 0;
    const pc = ap >= 0 ? 'var(--accent2)' : 'var(--danger)';
    return `<tr>
      <td>${getMonthLabel(mk)}</td>
      <td>${m.deals}</td>
      <td style="color:${pc}">${fmt(ap)}</td>
      <td>${fmtPct(am)}</td>
      <td>${ah > 0 ? Math.round(ah)+'d' : '—'}</td>
      <td style="color:var(--accent)">${fmtPct(ay)}</td>
      <td style="color:${m.profit>=0?'var(--accent2)':'var(--danger)'}">${fmt(m.profit)}</td>
    </tr>`;
  }).join('');

  // State detail table
  const stateRows = states.map(st => {
    const s = stateMap[st];
    const ap = s.profit / s.deals;
    const ah = s.hold.length ? s.hold.reduce((a,b)=>a+b,0)/s.hold.length : 0;
    const ar = s.revenue / s.deals;
    const pc = ap >= 0 ? 'var(--accent2)' : 'var(--danger)';
    return `<tr>
      <td>${st}</td>
      <td>${s.deals}</td>
      <td style="color:${pc}">${fmt(ap)}</td>
      <td>${fmt(ar)}</td>
      <td>${fmt(s.profit)}</td>
      <td>${ah > 0 ? Math.round(ah)+'d' : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
  <div class="stats-view">

    <!-- PAGE TITLE -->
    <div style="margin-bottom:22px">

    </div>

    <!-- HERO METRICS -->
    <div class="stats-hero">
      <div class="metric">
        <div class="metric-label">Total Contribution</div>
        <div class="metric-value ${totalProfit>0?'positive':'negative'}">${fmt(totalProfit)}</div>
        <div class="metric-sub">Across all ${n} deals</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg Contribution / Deal</div>
        <div class="metric-value ${avgProfit>0?'positive':'negative'}">${fmt(avgProfit)}</div>
        <div class="metric-sub">${profitCount} of ${n} deals profitable</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg Unit Margin</div>
        <div class="metric-value neutral">${fmtPct(avgMargin)}</div>
        <div class="metric-sub">Revenue − costs / revenue</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg Annualized Yield</div>
        <div class="metric-value positive">${fmtPct(avgYield)}</div>
        <div class="metric-sub">Net profit / loan × 365/days</div>
      </div>
    </div>

    <!-- HIGHLIGHT CARDS -->
    <div class="stat-highlight-grid">
      <div class="sh-card">
        <div class="sh-label">Avg Total Revenue</div>
        <div class="sh-val" style="color:var(--accent2)">${fmt(avgRev)}</div>
        <div class="sh-sub">Per deal</div>
      </div>
      <div class="sh-card">
        <div class="sh-label">Avg Total Costs</div>
        <div class="sh-val" style="color:var(--danger)">${fmt(avgCost)}</div>
        <div class="sh-sub">Per deal</div>
      </div>
      <div class="sh-card">
        <div class="sh-label">Avg Daily Spread</div>
        <div class="sh-val" style="color:var(--accent)">${fmt(avgDSpread)}</div>
        <div class="sh-sub">Net profit per hold day</div>
      </div>
      <div class="sh-card">
        <div class="sh-label">Avg Hold Period</div>
        <div class="sh-val" style="color:var(--warn)">${Math.round(avgHold)}d</div>
        <div class="sh-sub">LOC Advance to Payoff</div>
      </div>
      <div class="sh-card">
        <div class="sh-label">Avg Loan Amount</div>
        <div class="sh-val" style="color:var(--text)">${fmt(avgLoan)}</div>
        <div class="sh-sub">Per deal</div>
      </div>
      <div class="sh-card">
        <div class="sh-label">Total Revenue</div>
        <div class="sh-val" style="color:var(--accent2)">${fmt(totalRev)}</div>

      <div class="sh-card" style="border-color:rgba(96,239,176,0.2)">

        <div class="sh-val" style="color:var(--accent2);font-size:18px">${fmt(best.c.profit)}</div>

        <table class="trend-table">

    <div class="stats-grid-2">
      <div class="stats-card">

        <div class="bar-chart">${barChart(mProfits, maxMP, profitColor, '55px')}</div>

      <div class="stats-card">

    <div class="stats-card" style="margin-bottom:18px">
      <div class="stats-section-title">Average Net Profit by State</div>
      <div class="stats-grid-2" style="margin-bottom:0">
        <div>
          <div class="bar-chart">${barChart(sBars, maxSP, profitColor, '32px')}</div>

        <div style="overflow-x:auto">
          <table class="state-table">
            <thead><tr>
              <th style="text-align:left">State</th>
              <th>Deals</th>
              <th>Avg Profit</th>
              <th>Avg Revenue</th>
              <th>Total Contribution</th>
              <th>Avg Hold</th>
            </tr></thead>
            <tbody>${stateRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PROGRAM TYPE + LOAN SIZE -->
    <div class="stats-grid-2">
      <div class="stats-card">
        <div class="stats-section-title">Avg Net Profit by Program Type</div>
        <div class="bar-chart">${barChart(pBars, maxPP, profitColor, '100px')}</div>
      </div>
      <div class="stats-card">
        <div class="stats-section-title">Avg Net Profit by Loan Size</div>
        <div class="bar-chart">${barChart(lBars, maxLB, profitColor, '80px')}</div>
        <div style="margin-top:10px;font-size:10px;color:var(--muted)">Larger loans generate more absolute profit but may have lower margin % due to higher interest costs.</div>
      </div>
    </div>

  </div>`;

  // ── Draw daily spread line chart after DOM renders ────────
  setTimeout(() => drawDailySpreadChart(months, monthMap), 0);
}

function drawDailySpreadChart(months, monthMap) {
  const wrap = document.getElementById('dsChartWrap');
  if (!wrap || !months.length) return;

  // Compute avg dSpread per month
  const pts = months.map(mk => {
    const arr = monthMap[mk].dSpread;
    return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  }).filter(v => v !== null);
  const labels = months.filter(mk => monthMap[mk].dSpread.length > 0).map(mk => getMonthLabel(mk));
  const n = pts.length;
  if (n < 2) { wrap.innerHTML = '<div style="padding:20px;font-size:12px;color:var(--muted)">Not enough data to draw chart.</div>'; return; }

  // Chart dimensions
  const W = Math.max(wrap.offsetWidth || 700, 500);
  const H = 200;
  const PAD = { top:24, right:24, bottom:42, left:62 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  // Scale
  const minV = Math.min(...pts, 0);
  const maxV = Math.max(...pts) * 1.15;
  const yScale = v => PAD.top + cH - ((v - minV) / (maxV - minV)) * cH;
  const xScale = i => PAD.left + (i / (n - 1)) * cW;

  // Linear regression trend line
  const xMean = (n-1)/2;
  const yMean = pts.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  pts.forEach((v,i)=>{ num+=(i-xMean)*(v-yMean); den+=(i-xMean)**2; });
  const slope = den>0 ? num/den : 0;
  const intercept = yMean - slope*xMean;
  const trendY = i => intercept + slope*i;

  // Y-axis grid lines
  const yTicks = 4;
  let gridLines = '';
  let yLabels = '';
  for (let t=0; t<=yTicks; t++) {
    const v = minV + (maxV-minV)*t/yTicks;
    const y = yScale(v);
    gridLines += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#e2e5eb" stroke-width="1" stroke-dasharray="4,3"/>`;
    const label = v >= 1000 ? '$'+(v/1000).toFixed(1)+'k' : '$'+Math.round(v);
    yLabels += `<text x="${PAD.left-8}" y="${y+4}" text-anchor="end" fill="#7a8299" font-size="9" font-family="Inter">${label}</text>`;
  }

  // Zero line if needed
  const zeroLine = minV < 0 && maxV > 0
    ? `<line x1="${PAD.left}" y1="${yScale(0)}" x2="${W-PAD.right}" y2="${yScale(0)}" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>`
    : '';

  // Area fill (gradient under line)
  const areaPoints = pts.map((v,i) => `${xScale(i)},${yScale(v)}`).join(' ');
  const areaPath = `M ${xScale(0)},${yScale(Math.max(minV,0))} ` +
    pts.map((v,i) => `L ${xScale(i)},${yScale(v)}`).join(' ') +
    ` L ${xScale(n-1)},${yScale(Math.max(minV,0))} Z`;

  // Line path
  const linePath = pts.map((v,i) => `${i===0?'M':'L'} ${xScale(i)},${yScale(v)}`).join(' ');

  // Trend line
  const trendPath = `M ${xScale(0)},${yScale(trendY(0))} L ${xScale(n-1)},${yScale(trendY(n-1))}`;
  const trendUp = slope > 0; // positive slope = improving daily spread
  const trendColor = trendUp ? '#059669' : '#dc2626';

  // Data points + tooltips
  let circles = '';
  let xLabels = '';
  pts.forEach((v,i) => {
    const cx = xScale(i), cy = yScale(v);
    const color = v >= 0 ? '#1a2744' : '#dc2626';
    const valFmt = '$' + Math.abs(v).toFixed(0) + '/day';
    circles += `<circle cx="${cx}" cy="${cy}" r="4" fill="${color}" stroke="white" stroke-width="2">
      <title>${labels[i]}: ${v>=0?'':'-'}${valFmt}</title>
    </circle>`;
    // X-axis labels — every label if space allows, else every other
    const showLabel = n <= 8 || i % 2 === 0 || i === n-1;
    if (showLabel) {
      xLabels += `<text x="${cx}" y="${H-PAD.bottom+16}" text-anchor="middle" fill="#7a8299" font-size="9" font-family="Inter" transform="rotate(-30,${cx},${H-PAD.bottom+16})">${labels[i]}</text>`;
    }
  });

  // Trend annotation
  const trendDelta = trendY(n-1) - trendY(0);
  const trendLabel = (trendDelta >= 0 ? '▲ +' : '▼ ') + '$' + Math.abs(trendDelta).toFixed(0) + '/day trend';
  const trendAnnotX = xScale(n-1) - 4;
  const trendAnnotY = yScale(trendY(n-1)) - 10;

  const svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a2744" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#1a2744" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${gridLines}
    ${zeroLine}
    ${yLabels}
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <path d="${linePath}" fill="none" stroke="#1a2744" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${trendPath}" fill="none" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.85"/>
    ${circles}
    ${xLabels}
    <text x="${trendAnnotX}" y="${trendAnnotY}" text-anchor="end" fill="${trendColor}" font-size="9" font-family="Inter" font-weight="600">${trendLabel}</text>
    <text x="${PAD.left - 48}" y="${PAD.top + cH/2}" text-anchor="middle" fill="#7a8299" font-size="9" font-family="Inter" transform="rotate(-90,${PAD.left-48},${PAD.top+cH/2})">$/day</text>
  </svg>`;

  wrap.innerHTML = svg;
}

function downloadPDF() {
  const d = deals.find(x => x.id === activeId);
  if (!d) return;
  const c = compute(d);

  // Build a clean self-contained print window
  const w = window.open('', '_blank', 'width=900,height=700');

  const fmtD = s => {
    if (!s) return '—';
    const dt = new Date(s + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  };

  const sfPct = c.loan > 0 ? (c.sf / c.loan * 100).toFixed(2) + '%' : '—';

  // Breakdown rows
  const bRows = () => {
    const row = (lbl, type, basis, amt, sub) => {
      const color = type === 'income' ? '#16a34a' : '#dc2626';
      const badge = type === 'income' ? 'INCOME' : 'COST';
      const badgeColor = type === 'income' ? '#dcfce7' : '#fee2e2';
      const badgeText = type === 'income' ? '#15803d' : '#b91c1c';
      const subRow = sub ? `<tr><td style="padding:4px 8px 4px 30px;font-size:9px;color:#6b7280;font-style:italic" colspan="3">${sub}</td></tr>` : '';
      return `<tr style="border-bottom:1px solid #f3f4f6">
        <td style="padding:7px 8px;font-size:10px;color:${color}">
          ${lbl}
          <span style="display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;background:${badgeColor};color:${badgeText};margin-left:4px;font-weight:600;vertical-align:middle">${badge}</span>
        </td>
        <td style="padding:7px 8px;font-size:9px;color:#6b7280;max-width:200px">${basis}</td>
        <td style="padding:7px 8px;font-size:10px;color:${color};text-align:right;font-weight:600;white-space:nowrap">${fmt(amt)}</td>
      </tr>${subRow}`;
    };
    const subLine = (lbl, basis, amt) =>
      `<tr style="border-bottom:1px solid #f9fafb">
        <td style="padding:4px 8px 4px 24px;font-size:9px;color:#9ca3af">↳ ${lbl}</td>
        <td style="padding:4px 8px;font-size:9px;color:#9ca3af">${basis}</td>
        <td style="padding:4px 8px;font-size:10px;color:#1a2744;text-align:right">${fmt(amt)}</td>
      </tr>`;

    let h = '';
    h += row('PB Service Fee', 'income', `${sfPct} × ${fmt(c.loan)}`, c.sf);
    h += subLine('New Home Deposit (upfront)', 'Collected at purchase', c.dep);
    h += subLine('Remainder at closing', 'Collected at refi', Math.max(c.sfRem, 0));
    h += row('Client Daily Interest', 'income', `${fmt2(c.daily)}/day × ${c.clientDays}d`, c.intRev);
    if (c.add > 0) h += row('Additional Costs to Client', 'income', 'Extended hold or penalty', c.add);
    if (c.disc > 0) h += row('Discount to Client', 'cost', 'Flat reduction', c.disc);
    const fbLbl = c.pdBeforePayoff ? 'FB Paydown' : 'Payoff';

      `${c.fbRate}%/yr × ${c.fbDays}d × ${fmt(c.locAmt)} (LOC→${fbLbl})`, c.fbCost,
      c.tailDays > 0 && !c.pdBeforePayoff ? `Includes ${c.tailDays}d tail after Refi` : null);
    const mP1Lbl = c.pdBeforeRefi ? 'FB Paydown' : 'Refi';
    h += row(`Mezzanine Interest — Phase 1 (${c.mPct}% of loan)`, 'cost',
      `${c.mRate}%/yr × ${c.mP1Days}d × ${fmt(c.mAmt)} (Purchase→${mP1Lbl})`, c.mC1);
    if (c.pdBeforeRefi && c.mP2Days > 0)
      h += row('Mezzanine Interest — Phase 2 (100% @ 12%)', 'cost',
        `12%/yr × ${c.mP2Days}d × ${fmt(c.loan)} (Paydown→Refi)`, c.mC2,
        'First Bank paid off — full loan at Mezzanine rate');
    if (c.brk > 0) h += row('Broker Partner Revenue Share', 'cost', 'Flat payout', c.brk);
    if (c.lo > 0)  h += row('Loan Officer Revenue Share',   'cost', 'Flat payout', c.lo);
    return h;
  };

  const profitColor = c.profit >= 0 ? '#16a34a' : '#dc2626';

  <div class="date-box"><div class="date-lbl">Cash Purchase</div><div class="date-val">${fmtD(d.purchaseDate)}</div></div>
  <div class="date-box"><div class="date-lbl">Refi Date</div><div class="date-val">${fmtD(d.refiDate)}</div></div>
  <div class="date-box"><div class="date-lbl">Payoff Date</div><div class="date-val">${fmtD(d.payoffDate)}</div></div>
</div>
${d.paydownDate ? `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px;margin-bottom:14px;font-family:'DM Mono',monospace;font-size:9px;color:#92400e">
  ⚠ First Bank Required Paydown: ${fmtD(d.paydownDate)}${c.pdBeforeRefi ? ` · Phase 2 applies: ${c.mP2Days}d at 12% on full ${fmt(c.loan)}` : ' · Deal closed before paydown'}
</div>` : ''}

<!-- INTEREST PERIODS -->
<div class="pills-row">
  <div class="pill"><span class="pill-dot" style="background:#16a34a"></span>Client interest: ${c.clientDays}d (Purchase → Refi)</div>
  <div class="pill"><span class="pill-dot" style="background:#1a2744"></span>First Bank: ${c.fbDays}d (LOC → ${c.pdBeforePayoff ? 'Paydown' : 'Payoff'})</div>
  <div class="pill"><span class="pill-dot" style="background:#d97706"></span>Mezz P1: ${c.mP1Days}d${c.mP2Days > 0 ? ' · P2: ' + c.mP2Days + 'd' : ''}</div>
  ${c.tailDays > 0 ? `<div class="pill"><span class="pill-dot" style="background:#dc2626"></span>⚠ Tail: ${c.tailDays}d (Refi → Payoff)</div>` : ''}
</div>

<!-- LINE ITEM BREAKDOWN -->
<div class="section-hdr">Line Item Breakdown</div>
<table class="bd-table">
  <thead>
    <tr>
      <th>Line Item</th>
      <th>Basis</th>
      <th style="text-align:right">Amount</th>
    </tr>
  </thead>
  <tbody>
    ${bRows()}
    <tr class="total-row">
      <td style="padding:8px;color:#111827">Net Profit</td>
      <td style="padding:8px;font-size:9px;color:#9ca3af">Unit Margin: ${fmtPct(c.margin)}</td>
      <td style="padding:8px;text-align:right;color:${profitColor}">${fmt(c.profit)}</td>
    </tr>
  </tbody>
</table>

${(c.brk > 0 || c.lo > 0) ? `<div style="margin-top:8px;padding:8px 10px;background:#f9fafb;border-radius:6px;font-size:9px;color:#6b7280">
  Revenue shares paid: ${c.brk > 0 ? 'Broker ' + fmt(c.brk) : ''}${c.lo > 0 ? (c.brk > 0 ? ' · ' : '') + 'Loan Officer ' + fmt(c.lo) : ''}
</div>` : ''}

</body>
</html>`;

  w.document.write(html);
  w.document.close();
  // Slight delay so fonts load before print dialog
  setTimeout(() => { w.focus(); }, 800);
}

</script>
</body>
</html>
