<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zavvie · Deal Unit Economics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #e2e5eb;
  --navy: #1a2744;
  --navy-light: #233059;
  --accent: #e8441a;
  --accent-hover: #cc3614;
  --accent2: #00b386;
  --warn: #f59e0b;
  --danger: #dc2626;
  --text: #1a2744;
  --muted: #7a8299;
  --label: #4a5568;
  --sidebar-w: 268px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

header { background: var(--navy); border-bottom: none; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; flex-shrink: 0; height: 58px; box-shadow: 0 2px 8px rgba(26,39,68,0.18); }
.logo { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 0; }
.logo-z { color: #fff; }
.logo-dot { color: var(--accent); font-size: 28px; line-height: 1; margin: 0 1px; position: relative; top: 1px; }
.tagline { font-family: 'Inter', sans-serif; font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.25); }
.btn-outline:hover { border-color: rgba(255,255,255,0.6); color: #fff; background: rgba(255,255,255,0.08); }
.btn-warn { background: var(--accent); color: #fff; border: none; }
.btn-warn:hover { background: var(--accent-hover); }

.app-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 53px); }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--navy); border-right: none; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; box-shadow: 2px 0 8px rgba(26,39,68,0.12); }
.sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-section-title { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.4); margin-bottom: 9px; font-weight: 600; }
.upload-area { display: block; border: 1px dashed rgba(255,255,255,0.2); border-radius: 7px; padding: 9px 12px; text-align: center; cursor: pointer; transition: all 0.15s; font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'Inter', sans-serif; }
.upload-area:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,68,26,0.06); }
.upload-area input { display: none; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.sidebar-list::-webkit-scrollbar { width: 3px; }
.sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.deal-item { padding: 9px 14px; cursor: pointer; transition: background 0.1s; border-left: 3px solid transparent; }
.deal-item:hover { background: rgba(255,255,255,0.06); }
.deal-item.active { background: rgba(232,68,26,0.15); border-left-color: var(--accent); }
.deal-item.cmp-sel { background: rgba(0,179,134,0.12); border-left-color: var(--accent2); }
.di-name { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.9); line-height: 1.3; margin-bottom: 1px; }
.di-addr { font-size: 10px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.di-profit { font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 3px; }
.sidebar-footer { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.cmp-count { font-size: 10px; color: rgba(255,255,255,0.4); font-family: 'Inter', sans-serif; margin-bottom: 6px; }

/* MAIN */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; color: var(--muted); text-align: center; padding: 40px; }
.empty-icon { font-size: 44px; opacity: 0.3; }
.empty-title { font-family: 'Inter', sans-serif; font-size: 20px; color: var(--label); font-weight: 700; }
.empty-sub { font-size: 12px; line-height: 1.6; max-width: 300px; }

/* REPORT */
.report { max-width: 1060px; margin: 0 auto; padding: 28px 32px 80px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(26,39,68,0.06); }
.card-title { font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 7px; font-weight: 600; }
.card-title::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.field-group-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 13px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1/-1; }
label { font-size: 11px; color: var(--label); font-weight: 500; font-family: 'Inter', sans-serif; }
.input-wrap { position: relative; }
.prefix, .suffix { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); pointer-events: none; }
.prefix { left: 10px; } .suffix { right: 10px; }
input[type="number"], input[type="date"], input[type="text"] { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 8px 11px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; -moz-appearance: textfield; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
.has-prefix input { padding-left: 24px; } .has-suffix input { padding-right: 28px; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,68,26,0.12); }
input[type="date"] { color-scheme: light; }
.field-note { font-size: 10px; color: var(--muted); line-height: 1.4; font-family: 'Inter', sans-serif; }
.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* P&L METRICS */
.deal-header h2 { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 14px; line-height: 1.3; }
.results-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
.metric { background: #fff; padding: 16px; display: flex; flex-direction: column; gap: 4px; }
.metric.featured { background: var(--navy); grid-column: 1/-1; flex-direction: row; align-items: center; justify-content: space-between; padding: 18px 22px; }
.metric.featured .metric-label { color: rgba(255,255,255,0.55); font-size: 10px; }
.metric.featured .metric-value { font-size: 36px; color: #fff; }
.metric.featured .metric-value.positive { color: #34d399; }
.metric.featured .metric-value.negative { color: #f87171; }
.metric.featured .metric-sub { color: rgba(255,255,255,0.5); }
.metric.featured .margin-badge { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 20px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); letter-spacing: 0.04em; }
.metric-label { font-size: 9px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; }
.metric-value { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800; color: var(--navy); line-height: 1; }
.metric-value.positive { color: #059669; } .metric-value.negative { color: var(--danger); } .metric-value.neutral { color: var(--navy); }
.metric-sub { font-size: 10px; color: var(--muted); font-family: 'Inter', sans-serif; }
.profit-bar-wrap { background: var(--surface2); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
.profit-bar-label { font-size: 11px; color: var(--muted); font-family: 'Inter', sans-serif; white-space: nowrap; font-weight: 500; }
.bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

/* BREAKDOWN */
.breakdown { width: 100%; border-collapse: collapse; font-size: 12px; }
.breakdown th { text-align: left; font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 7px 10px; border-bottom: 2px solid var(--border); font-weight: 600; }
.breakdown th:last-child, .breakdown td:last-child { text-align: right; }
.breakdown td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; }
.breakdown tr:last-child td { border-bottom: none; }
.row-income td:first-child { color: #059669; font-weight: 500; } .row-cost td:first-child { color: var(--danger); font-weight: 500; }
.breakdown .total-row td { border-top: 2px solid var(--navy); font-weight: 700; padding-top: 10px; background: #f8f9fb; }
.badge { display: inline-block; font-size: 9px; font-family: 'Inter', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; font-weight: 600; }
.badge-income { background: #d1fae5; color: #065f46; }
.badge-cost { background: #fee2e2; color: #991b1b; }
.badge-neutral { background: #e2e5eb; color: var(--muted); }

/* PAYDOWN */
.paydown-panel { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
.paydown-title { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: #92400e; margin-bottom: 11px; display: flex; align-items: center; gap: 7px; font-weight: 700; }

/* PILLS */
.info-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; color: var(--label); background: #fff; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-family: 'Inter', sans-serif; font-weight: 500; }
.info-pill-row { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
.info-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sf-display { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; gap: 20px; flex-wrap: wrap; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.split-display { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* COMPARE */
.compare-view { padding: 28px 28px 80px; max-width: 1400px; margin: 0 auto; }
.compare-h2 { font-family: 'Inter', sans-serif; font-size: 24px; color: var(--navy); margin-bottom: 4px; font-weight: 800; }
.compare-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: 'Inter', sans-serif; }
.compare-wrap { overflow-x: auto; }
.compare-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(26,39,68,0.08); }
.compare-table th { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 9px 13px; border-bottom: 2px solid var(--border); text-align: right; white-space: nowrap; font-weight: 600; background: var(--surface2); }
.compare-table th:first-child { text-align: left; min-width: 160px; }
.compare-table td { padding: 9px 13px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; text-align: right; }
.compare-table td:first-child { text-align: left; color: var(--label); font-size: 11px; font-family: 'Inter', sans-serif; }
.compare-table .sec-hdr td { background: var(--navy); color: rgba(255,255,255,0.6); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 13px; font-family: 'Inter', sans-serif; font-weight: 600; }
.cn { font-size: 11px; font-weight: 600; color: var(--navy); max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Inter', sans-serif; }
.ca { font-size: 9px; color: var(--muted); max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Inter', sans-serif; }
.pc { color: #059669 !important; font-weight: 600; } .nc { color: var(--danger) !important; } .wc { color: var(--warn) !important; }
.best { background: #f0fdf4 !important; }

/* STATS DASHBOARD */
.stats-view { padding: 28px 32px 80px; max-width: 1200px; margin: 0 auto; }
.stats-hero { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 22px; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(26,39,68,0.08); }
.stats-hero .metric { padding: 20px; background: #fff; }
.stats-section-title { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; font-weight: 700; }
.stats-section-title::before { content:''; display:block; width:5px; height:5px; border-radius:50%; background:var(--accent); }
.stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.stats-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.stats-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(26,39,68,0.06); }

/* BAR CHART */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-row-label { font-family: 'Inter', sans-serif; font-size: 10px; color: var(--label); width: 90px; flex-shrink: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.bar-row-label.wide { width: 130px; }
.bar-outer { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; border: 1px solid var(--border); }
.bar-inner { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; font-family: 'Inter', monospace; font-size: 10px; color: #fff; font-weight: 600; min-width: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
.bar-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--label); width: 80px; text-align: right; flex-shrink: 0; }

/* TREND TABLE */
.trend-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.trend-table th { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 7px 10px; border-bottom: 2px solid var(--border); text-align: right; font-weight: 600; background: var(--surface2); }
.trend-table th:first-child { text-align: left; }
.trend-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; }
.trend-table td:first-child { text-align: left; color: var(--label); font-family: 'Inter', sans-serif; font-weight: 500; }
.trend-table tr:last-child td { border-bottom: none; }

/* SCATTER / MINI-CHART */
.mini-line { position: relative; height: 80px; }
.mini-line canvas { position: absolute; top: 0; left: 0; }

/* STAT HIGHLIGHT CARDS */
.stat-highlight-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
.sh-card { background: #fff; border: 1px solid var(--border); border-radius: 9px; padding: 14px; box-shadow: 0 1px 3px rgba(26,39,68,0.05); }
.sh-label { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
.sh-val { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; }
.sh-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'Inter', sans-serif; }

/* STATE MAP TABLE */
.state-table { width: 100%; border-collapse: collapse; }
.state-table th { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 6px 10px; border-bottom: 2px solid var(--border); text-align: right; font-weight: 600; background: var(--surface2); }
.state-table th:first-child { text-align: left; }
.state-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; }
.state-table td:first-child { text-align: left; color: var(--navy); font-weight: 600; font-family: 'Inter', sans-serif; }
.state-table tr:last-child td { border-bottom: none; }

/* SIDEBAR NAV */
.sidebar-nav { padding: 10px 14px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); transition: all 0.12s; margin-bottom: 2px; font-family: 'Inter', sans-serif; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.nav-item.active { background: rgba(232,68,26,0.2); color: #fff; }
.nav-icon { font-size: 13px; }

/* ── DATA RESOURCES ─────────────────────────── */
.data-resources-view { padding: 28px 32px 80px; max-width: 900px; margin: 0 auto; }
.dr-page-title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.dr-page-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
.dr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(26,39,68,0.06); }
.dr-card-title { font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 7px; font-weight: 700; }
.dr-card-title::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.rate-table { width: 100%; border-collapse: collapse; }
.rate-table th { font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 8px 12px; border-bottom: 2px solid var(--border); text-align: left; font-weight: 700; background: var(--surface2); }
.rate-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 13px; vertical-align: middle; }
.rate-table tr:last-child td { border-bottom: none; }
.rate-table tr:hover td { background: var(--surface2); }
.rate-input { background: #fff; border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--navy); outline: none; width: 120px; }
.rate-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(232,68,26,0.1); }
.rate-delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.12s; }
.rate-delete-btn:hover { background: #fee2e2; color: var(--danger); }
.add-rate-row { display: flex; gap: 10px; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.add-rate-label { font-size: 12px; color: var(--label); font-family: 'Inter', sans-serif; font-weight: 500; }
.rate-badge { display: inline-block; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 12px; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.current-badge { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }

/* ── DEAL INTELLIGENCE ───────────────────────── */
.intel-card { background: var(--navy); color: #fff; border-radius: 10px; padding: 22px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(26,39,68,0.18); }
.intel-title { font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: rgba(255,255,255,0.5); margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; }
.intel-title-left { display: flex; align-items: center; gap: 8px; }
.intel-title-left::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

/* RISK SCORE */
.risk-score-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.risk-dial { width: 80px; height: 80px; flex-shrink: 0; position: relative; }
.risk-dial svg { width: 80px; height: 80px; }
.risk-score-info { flex: 1; }

    </div>

    </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────
let deals = [];
let activeId = null;
let cmpMode = false;
let cmpIds = new Set();
let thresholds = { minProfit: 2000, minMargin: 15 }; // user-configurable

// First Bank LOC rate schedule — effective date (inclusive start) + annual rate %
// Sorted ascending by date. Last entry = current rate going forward.
let fbRateSchedule = [
  { from: '2000-01-01', rate: 8.50, label: 'Before 10/1/24' },
  { from: '2024-10-01', rate: 8.00, label: '10/1/24 – 12/1/24' },
  { from: '2024-12-02', rate: 7.75, label: '12/2/24 – 1/1/25' },
  { from: '2025-01-02', rate: 7.50, label: '1/2/25 – 9/30/25' },
  { from: '2025-10-01', rate: 7.25, label: '10/1/25 – 11/2/25' },
  { from: '2025-11-03', rate: 7.00, label: '11/3/25 – 1/1/26' },
  { from: '2026-01-02', rate: 6.75, label: '1/2/26 and after' },
];

// Mezzanine interest rate schedule — weighted avg rates from Mezzanine Avg Interest Rate History.
// Source: Mezzanine_Avg_Interest_Rate_History_3.xlsx — capital-weighted avg rate per period.
// Rate applies from the FROM date (inclusive) forward until the next entry.
let mezzRateSchedule = [
  { from: '2023-06-15', rate: 12.0000, label: '6/15/23 – 2/25/24' },
  { from: '2024-02-26', rate: 12.0000, label: '2/26/24 – 3/14/24' },
  { from: '2024-03-15', rate: 12.0000, label: '3/15/24 – 5/9/24' },
  { from: '2024-05-10', rate: 12.0000, label: '5/10/24 – 5/30/24' },
  { from: '2024-05-31', rate: 12.0000, label: '5/31/24' },
  { from: '2024-06-01', rate: 14.3211, label: '6/1/24 – 6/19/24' },
  { from: '2024-06-20', rate: 14.3669, label: '6/20/24 – 6/23/24' },
  { from: '2024-06-24', rate: 14.4641, label: '6/24/24 – 7/24/24' },
  { from: '2024-07-25', rate: 15.5549, label: '7/25/24 – 9/9/24' },
  { from: '2024-09-10', rate: 15.6337, label: '9/10/24 – 9/14/24' },
  { from: '2024-09-15', rate: 15.8619, label: '9/15/24 – 1/31/25' },
  { from: '2025-02-01', rate: 15.9234, label: '2/1/25 – 5/11/25' },
  { from: '2025-05-12', rate: 15.9870, label: '5/12/25 – 5/30/25' },
  { from: '2025-05-31', rate: 16.0196, label: '5/31/25 – 10/8/25' },
  { from: '2025-10-09', rate: 16.3772, label: '10/9/25 – 11/23/25' },
  { from: '2025-11-24', rate: 16.4165, label: '11/24/25 – 2/28/26' },
  { from: '2026-03-01', rate: 14.9891, label: '3/1/26 – 3/12/26' },
  { from: '2026-03-13', rate: 12.0963, label: '3/13/26 and after' },
];

// ── FORMAT HELPERS ────────────────────────────────────────
const fmt = n => {
  if (n == null || isNaN(n)) return '—';
  const s = Math.abs(n).toLocaleString('en-US', {maximumFractionDigits:0});
  return (n < 0 ? '($' : '$') + s + (n < 0 ? ')' : '');
};
const fmt2 = n => {
  if (n == null || isNaN(n)) return '—';
  const s = Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n < 0 ? '($' : '$') + s + (n < 0 ? ')' : '');
};
const fmtPct = n => (n == null || isNaN(n) || !isFinite(n)) ? '—' : n.toFixed(1) + '%';
const days = (a, b) => {
  if (!a || !b) return 0;
  const d = Math.round((new Date(b) - new Date(a)) / 86400000);
  return d > 0 ? d : 0;
};
const addD = (s, n) => {
  if (!s) return '';
  const d = new Date(s); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
};
const earlier = (a, b) => { if (!a) return b; if (!b) return a; return a <= b ? a : b; };
const parseMon = s => parseFloat(String(s || '').replace(/[$, ]/g,'')) || 0;
const parseDt = s => {
  if (!s) return '';
  const p = s.trim().split('/');
  if (p.length === 3) {
    let [m, d, y] = p;
    if (y.length === 2) y = '20' + y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return s.trim();
};

// ── MEZZ RATE SPLIT HELPER ────────────────────────────────
// Splits a mezzanine accrual period at the 3/17→3/18 2026 rate change.
// Returns cost, plus breakdown for display.
// principal = dollar amount to charge the rate on
// startDate, endDate = ISO date strings for the accrual window
// override = true means use overrideRate for the whole period
function mezzSplit(principal, startDate, endDate, override, overrideRate) {
  // Splits a mezzanine accrual window across the mezzRateSchedule tiers.
  // If override=true, uses overrideRate for the entire period.
  if (!startDate || !endDate || startDate >= endDate || !principal)
    return { cost:0, segments:[], pre16Days:0, post12Days:0 };

  if (override) {
    const d = days(startDate, endDate);
    const cost = principal * (overrideRate/100) * (d/365);
    return { cost, segments:[{ rate:overrideRate, d, cost }], pre16Days:d, post12Days:0 };
  }

  const schedule = [...mezzRateSchedule].sort((a,b) => a.from < b.from ? -1 : 1);
  let totalCost = 0;
  const segments = [];

  for (let i = 0; i < schedule.length; i++) {
    const tierStart = schedule[i].from;
    const tierEnd   = i + 1 < schedule.length ? schedule[i+1].from : '9999-12-31';
    const rate      = schedule[i].rate;

    const segStart = startDate > tierStart ? startDate : tierStart;
    const segEnd   = endDate   < tierEnd   ? endDate   : tierEnd;
    if (segStart >= segEnd) continue;

    const d    = days(segStart, segEnd);
    const cost = principal * (rate/100) * (d/365);
    totalCost += cost;
    segments.push({ rate, d, cost, segStart, segEnd, label: schedule[i].label });
  }

  // Keep legacy pre16Days/post12Days fields for any code that still reads them
  const firstSeg  = segments[0] || {};
  const lastSeg   = segments[segments.length-1] || {};
  const pre16Days  = segments.filter(s => s.rate > 12).reduce((a,s)=>a+s.d, 0);
  const post12Days = segments.filter(s => s.rate <= 12).reduce((a,s)=>a+s.d, 0);
  return { cost: totalCost, segments, pre16Days, post12Days };
}

// Get Mezzanine rate on a specific date (for display)
function mezzRateOnDate(date) {
  if (!date) return 12;
  const schedule = [...mezzRateSchedule].sort((a,b) => a.from < b.from ? -1 : 1);
  let rate = schedule[0].rate;
  for (const tier of schedule) {
    if (date >= tier.from) rate = tier.rate;
    else break;
  }
  return rate;
}

// ── FIRST BANK RATE SPLIT HELPER ─────────────────────────
// Calculates interest cost for a period that may span multiple FB rate tiers.
// startDate = LOC Advance Date, endDate = earlier of Payoff or FB Paydown
function fbRateSplit(principal, startDate, endDate) {
  if (!startDate || !endDate || startDate >= endDate || !principal)
    return { cost: 0, segments: [] };

  const schedule = [...fbRateSchedule].sort((a, b) => a.from < b.from ? -1 : 1);
  let totalCost = 0;
  const segments = [];

  for (let i = 0; i < schedule.length; i++) {
    const tierStart = schedule[i].from;
    const tierEnd   = i + 1 < schedule.length ? schedule[i + 1].from : '9999-12-31';
    const rate      = schedule[i].rate;

    // Intersection of [startDate, endDate) with [tierStart, tierEnd)
    const segStart = startDate > tierStart ? startDate : tierStart;
    const segEnd   = endDate   < tierEnd   ? endDate   : tierEnd;
    if (segStart >= segEnd) continue;

    const d    = days(segStart, segEnd);
    const cost = principal * (rate / 100) * (d / 365);
    totalCost += cost;
    segments.push({ rate, d, cost, segStart, segEnd, label: schedule[i].label });
  }

  return { cost: totalCost, segments };
}

// Get the single FB rate that applies on a given date (for display/deal input default)
function fbRateOnDate(date) {
  if (!date) return 6.75;
  const schedule = [...fbRateSchedule].sort((a, b) => a.from < b.from ? -1 : 1);
  let rate = schedule[0].rate;
  for (const tier of schedule) {
    if (date >= tier.from) rate = tier.rate;
    else break;
  }
  return rate;
}

// ── COMPUTE ───────────────────────────────────────────────
function compute(d) {
  const loan = d.loanAmount || 0;
  const locPct = d.locSplitPct || 80, mPct = d.mezzSplitPct || 20;
  const locAmt = loan * locPct / 100, mAmt = loan * mPct / 100;
  // First Bank rate is now calculated from the rate schedule, not per-deal field
  // d.firstBankRate is kept as a display/override field but ignored in calc
  const mOverride = d.mezzRateOverride || false;
  const mOverrideRate = d.mezzRate || 12;
  const dep = d.depositFee || 0, sf = d.serviceFeeTotal || 0;
  const daily = d.clientDaily || 0;
  const disc = d.clientDiscount || 0, add = d.additionalClientCosts || 0;
  const brk = d.brokerShare || 0, lo = d.loShare || 0;

  const loc = d.locDate || '', pur = d.purchaseDate || '';
  const refi = d.refiDate || '', poff = d.payoffDate || '', pd = d.paydownDate || '';

  const clientDays_ = days(pur, refi);
  const tailDays_   = days(refi, poff);
  const totalDays_  = days(loc, poff);

  const pdBeforeRefi   = pd && refi && pd < refi;
  const pdBeforePayoff = pd && poff && pd < poff;

  // First Bank: LOC Advance → earlier of (Payoff, FB Paydown)
  const fbEnd    = earlier(poff, pd);
  const fbDays_  = days(loc, fbEnd);
  const fbSplit  = fbRateSplit(locAmt, loc, fbEnd);
  const fbCost   = fbSplit.cost;

  // Mezzanine Phase 1: 20% tranche, Purchase → earlier of (Refi, FB Paydown)
  const mP1End   = earlier(refi, pd);
  const mP1Days_ = days(pur, mP1End);
  const m1Split  = mezzSplit(mAmt, pur, mP1End, mOverride, mOverrideRate);

  // Mezzanine Phase 2: 100% of loan, day after FB Paydown → Refi (only if paydown < refi)
  const mP2Start = pdBeforeRefi ? addD(pd, 1) : null;
  const mP2Days_ = pdBeforeRefi ? days(mP2Start, refi) : 0;
  const m2Split  = pdBeforeRefi ? mezzSplit(loan, mP2Start, refi, mOverride, mOverrideRate) : { cost:0, pre16Days:0, post12Days:0, pre16Cost:0, post12Cost:0 };

  const mC1   = m1Split.cost;
  const mC2   = m2Split.cost;
  const mCost = mC1 + mC2;

  // Effective display rate — 'split' if period crosses a rate boundary, else single rate
  const mScheduleSorted = [...mezzRateSchedule].sort((a,b)=>a.from<b.from?-1:1);
  const mRateAtStart = mezzRateOnDate(pur);
  const mRateAtEnd   = mP1End ? mezzRateOnDate(mP1End) : mRateAtStart;
  const mRateDisplay = mOverride ? mOverrideRate
    : (mRateAtStart !== mRateAtEnd || m1Split.segments.length > 1) ? 'split'
    : mRateAtStart;

  const sfRem   = sf - dep;
  const intRev  = daily * clientDays_;
  const totRev  = sf + intRev + add - disc;
  const totCost = fbCost + mCost + brk + lo;

  const profit  = totRev - totCost;
  const margin  = totRev > 0 ? profit/totRev*100 : 0;
  const dSpread = totalDays_ > 0 ? profit/totalDays_ : 0;
  const aYield  = loan > 0 && totalDays_ > 0 ? profit/loan*(365/totalDays_)*100 : 0;

  return {
    loan, locAmt, mAmt, locPct, mPct,
    fbRate: fbRateOnDate(loc), fbSplit,
    mRate: mRateDisplay, mOverride, mOverrideRate,
    dep, sf, sfRem, daily, disc, add, brk, lo,
    loc, pur, refi, poff, pd,
    clientDays: clientDays_, tailDays: tailDays_, totalDays: totalDays_,
    pdBeforeRefi, pdBeforePayoff, fbEnd, fbDays: fbDays_,
    mP1Days: mP1Days_, mP1End, mP2Days: mP2Days_, mP2Start,
    m1Split, m2Split,
    intRev, totRev, fbCost, mC1, mC2, mCost, totCost,
    profit, margin, dSpread, aYield
  };
}

// ── SIDEBAR ───────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (!deals.length) { list.innerHTML = '<div style="padding:16px 14px;font-size:11px;color:var(--muted)">No deals. Import CSV or add new.</div>'; return; }
  list.innerHTML = deals.map(d => {
    const c = compute(d);
    const isAct = d.id === activeId, isCmp = cmpIds.has(d.id);
    const cls = isAct ? 'deal-item active' : isCmp ? 'deal-item cmp-sel' : 'deal-item';
    const pc = c.profit > 0 ? 'var(--accent2)' : c.profit < 0 ? 'var(--danger)' : 'var(--muted)';
    const nm = d.dealName.length > 30 ? d.dealName.slice(0,28)+'…' : d.dealName;
    const ad = (d.address||'').length > 34 ? d.address.slice(0,32)+'…' : (d.address||'—');
    return `<div class="${cls}" onclick="handleClick('${d.id}')">
      <div class="di-name">${nm}</div>
      <div class="di-addr">${ad}</div>
      ${c.profit !== 0 ? `<div class="di-profit" style="color:${pc}">${fmt(c.profit)}</div>` : ''}
    </div>`;
  }).join('');

  const cntEl = document.getElementById('cmpCount');
  const cmpBtn = document.getElementById('compareBtn');
  if (cmpMode) {
    cntEl.textContent = cmpIds.size ? `${cmpIds.size} selected` : 'Click deals to select';
    cmpBtn.style.display = cmpIds.size >= 2 ? 'block' : 'none';
  } else {
    cntEl.textContent = 'Select deals to compare';
    cmpBtn.style.display = 'none';
  }
}

function handleClick(id) {
  if (cmpMode) { cmpIds.has(id) ? cmpIds.delete(id) : cmpIds.add(id); renderSidebar(); }
  else selectDeal(id);
}

function selectDeal(id) {
  activeId = id;
  const statsNav = document.getElementById('nav-stats');
  if (statsNav) statsNav.classList.remove('active');
  renderSidebar();
  const d = deals.find(x => x.id === id);
  if (d) renderReport(d);
  const dlBtn = document.getElementById('downloadBtn');
  if (dlBtn) dlBtn.style.display = 'block';
}

function addNewDeal() {
  const d = { id:'d_'+Date.now(), dealName:'New Deal', address:'', purchasePrice:0, loanAmount:0, clientDaily:0, locDate:'', purchaseDate:'', refiDate:'', payoffDate:'', paydownDate:'', serviceFeeTotal:0, depositFee:0, firstBankRate:6.5, locSplitPct:80, mezzSplitPct:20, mezzRate:12, mezzRateOverride:false, brokerShare:0, loShare:0, additionalClientCosts:0, clientDiscount:0 };
  deals.push(d);
  renderSidebar();
  selectDeal(d.id);
}

function toggleCmpMode() {
  cmpMode = !cmpMode; cmpIds.clear();
  const btn = document.getElementById('cmpModeBtn');
  btn.textContent = cmpMode ? 'Exit Compare Mode' : 'Enable Compare Mode';
  btn.style.borderColor = cmpMode ? 'var(--accent2)' : '';
  btn.style.color = cmpMode ? 'var(--accent2)' : '';
  renderSidebar();
  if (!cmpMode && activeId) selectDeal(activeId);
}

function showCompare() {
  const sel = deals.filter(d => cmpIds.has(d.id));
  if (sel.length >= 2) renderCompare(sel);
}

// ── FIELD UPDATE ──────────────────────────────────────────
function upd(id, field, val) {
  const d = deals.find(x => x.id === id);
  if (!d) return;
  const nums = ['loanAmount','purchasePrice','clientDaily','serviceFeeTotal','depositFee','firstBankRate','locSplitPct','mezzSplitPct','mezzRate','brokerShare','loShare','additionalClientCosts','clientDiscount'];
  d[field] = nums.includes(field) ? (parseFloat(val)||0) : val;

  if (field === 'purchaseDate') {
    d.locDate = val ? addD(val,-1) : '';
    const el = document.getElementById(`f_locDate_${id}`); if (el) el.value = d.locDate;
    d.paydownDate = d.locDate ? addD(d.locDate,180) : '';
    const el2 = document.getElementById(`f_paydownDate_${id}`); if (el2) el2.value = d.paydownDate;
  }
  if (field === 'locDate') {
    d.paydownDate = val ? addD(val,180) : '';
    const el = document.getElementById(`f_paydownDate_${id}`); if (el) el.value = d.paydownDate;
  }
  if (field === 'locSplitPct') {
    d.mezzSplitPct = Math.max(0,100-d.locSplitPct);
    const el = document.getElementById(`f_mezzSplitPct_${id}`); if (el) el.value = d.mezzSplitPct;
  }
  if (field === 'mezzSplitPct') {
    d.locSplitPct = Math.max(0,100-d.mezzSplitPct);
    const el = document.getElementById(`f_locSplitPct_${id}`); if (el) el.value = d.locSplitPct;
  }
  // When purchaseDate changes, re-evaluate auto mezz rate
  if (field === 'purchaseDate' && !d.mezzRateOverride) {
    const autoR = d.purchaseDate ? mezzRateOnDate(d.purchaseDate) : mezzRateOnDate(new Date().toISOString().split('T')[0]);
    d.mezzRate = autoR;
    const mEl = document.getElementById(`f_mezzRate_${id}`);
    if (mEl) mEl.value = autoR.toFixed(4);
    const nEl = document.getElementById(`mezzRateNote_${id}`);
    if (nEl) nEl.textContent = d.purchaseDate ? `⚡ ${autoR.toFixed(4)}% from schedule (splits across tiers if deal spans rate changes)` : '⚡ Auto-set once Cash Purchase Date is entered';
  }
  refreshResults(id);
  if (field === 'dealName' || field === 'address') renderSidebar();
}

function toggleMezzOverride(id, checked) {
  const d = deals.find(x => x.id === id);
  if (!d) return;
  d.mezzRateOverride = checked;
  if (!checked) {
    // Revert to auto rate from schedule
    const autoR = d.purchaseDate ? mezzRateOnDate(d.purchaseDate) : mezzRateOnDate(new Date().toISOString().split('T')[0]);
    d.mezzRate = autoR;
    const mEl = document.getElementById(`f_mezzRate_${id}`);
    if (mEl) { mEl.value = autoR.toFixed(4); mEl.readOnly = true; mEl.style.opacity = '0.6'; }
    const nEl = document.getElementById(`mezzRateNote_${id}`);
    if (nEl) nEl.textContent = d.purchaseDate ? `⚡ ${autoR.toFixed(4)}% from schedule (splits across tiers if deal spans rate changes)` : '⚡ Auto-set once Cash Purchase Date is entered';
  } else {
    const mEl = document.getElementById(`f_mezzRate_${id}`);
    if (mEl) { mEl.readOnly = false; mEl.style.opacity = '1'; mEl.focus(); }
    const nEl = document.getElementById(`mezzRateNote_${id}`);
    if (nEl) nEl.textContent = 'Manual override active';
  }
  refreshResults(id);
}

// ── REFRESH RESULTS ───────────────────────────────────────
function refreshResults(id) {
  const d = deals.find(x => x.id === id);
  if (!d) return;
  const c = compute(d);
  const S = (eid, v) => { const el=document.getElementById(eid); if(el) el.textContent=v; };
  const C = (eid, cls) => { const el=document.getElementById(eid); if(el) el.className=cls; };

  // Header
  const hEl = document.getElementById(`dh_${id}`);
  if (hEl) hEl.innerHTML = (d.dealName||'New Deal') + (d.address ? ` <span style="color:var(--muted);font-size:15px;font-weight:400"> · ${d.address}</span>` : '');

  // Featured Unit Margin row
  S(`rum_${id}`, fmtPct(c.margin));
  C(`rum_${id}`, 'metric-value '+(c.margin>0?'positive':c.margin<0?'negative':''));
  S(`rum_sub_${id}`, `Contribution: ${fmt(c.profit)}`);
  S(`rv_${id}`, fmt(c.totRev));
  S(`rc_${id}`, fmt(c.totCost));
  S(`rp_${id}`, fmt(c.profit));
  C(`rp_${id}`, 'metric-value '+(c.profit>0?'positive':c.profit<0?'negative':''));
  S(`rm_${id}`, `Unit Margin: ${fmtPct(c.margin)}`);
  S(`rd_${id}`, c.totalDays>0?c.totalDays+'d':'—');
  S(`rds_${id}`, c.totalDays>0?fmt(c.dSpread)+'/day':'—');
  C(`rds_${id}`, 'metric-value '+(c.dSpread>0?'positive':c.dSpread<0?'negative':''));
  S(`ry_${id}`, c.totalDays>0?fmtPct(c.aYield):'—');
  C(`ry_${id}`, 'metric-value '+(c.aYield>0?'positive':c.aYield<0?'negative':''));

  const bar = document.getElementById(`bar_${id}`);
  if (bar) { bar.style.width=Math.min(Math.max(c.margin,0),100)+'%'; bar.style.background=c.profit>0?'var(--accent2)':'var(--danger)'; }
  S(`barpct_${id}`, fmtPct(c.margin));

  const sfd = document.getElementById(`sfd_${id}`);
  if (sfd) {
    sfd.style.display = (c.sf>0||c.dep>0) ? 'flex' : 'none';
    S(`sft_${id}`,fmt(c.sf)); S(`sfdep_${id}`,fmt(c.dep)); S(`sfrem_${id}`,fmt(Math.max(c.sfRem,0)));
  }
  S(`la_${id}`, fmt(c.locAmt)); S(`ma_${id}`, fmt(c.mAmt));

  const pdi = document.getElementById(`pdi_${id}`);
  if (pdi) {
    pdi.style.display = d.paydownDate ? 'block' : 'none';
    if (d.paydownDate) {
      S(`pdp1_${id}`, `FB: ${c.fbDays}d | Mezz 20%: ${c.mP1Days}d`);
      S(`pdp2_${id}`, c.mP2Days>0?c.mP2Days+'d':'None');
      const wEl = document.getElementById(`pdw_${id}`); if (wEl) wEl.style.display=(c.pdBeforeRefi||c.pdBeforePayoff)?'block':'none';
    }
  }
  S(`pc_${id}`, c.clientDays>0?`Client: ${c.clientDays}d (Purchase→Refi)`:'Client: enter dates');
  S(`pf_${id}`, c.fbDays>0?`First Bank: ${c.fbDays}d (LOC→${c.fbEnd===d.paydownDate?'Paydown':'Payoff'})`:'First Bank: enter dates');
  S(`pm_${id}`, c.mP1Days>0?`Mezz P1: ${c.mP1Days}d${c.mP2Days>0?' · P2: '+c.mP2Days+'d':''}`:'Mezz: enter dates');
  S(`pt_${id}`, c.tailDays>0?`⚠ Tail: ${c.tailDays}d`:'No tail');

  renderBD(id, c, d);
  renderIntel(id);
  // Update FB rate display field
  const fbDisp = document.getElementById(`fbRateDisplay_${id}`);
  if (fbDisp) {
    fbDisp.textContent = c.fbSplit && c.fbSplit.segments.length > 1
      ? c.fbSplit.segments.map(s => s.rate + '%×' + s.d + 'd').join(' + ')
      : (c.fbRate || '—') + '%/yr';
  }
  renderSidebar();
}

function renderBD(id, c, d) {
  const tb = document.getElementById(`bd_${id}`);
  if (!tb) return;
  const row = (lbl,basis,amt,inc,warn) => {
    const cl=inc?'row-income':'row-cost', bg=inc?'<span class="badge badge-income">Income</span>':'<span class="badge badge-cost">Cost</span>';
    const col=inc?'var(--accent2)':'var(--danger)';
    const wt=warn?`<br><span style="color:var(--warn);font-size:9px">⚠ ${warn}</span>`:'';
    return `<tr class="${cl}"><td>${lbl}${bg}${wt}</td><td style="color:var(--muted);font-size:10px">${inc?'Revenue':'Cost'}</td><td style="color:var(--muted);font-size:10px">${basis}</td><td style="color:${col}">${fmt(amt)}</td></tr>`;
  };
  const sub = (lbl,basis,amt,col) =>
    `<tr><td style="color:var(--muted);padding-left:22px;font-size:11px">↳ ${lbl}</td><td></td><td style="color:var(--muted);font-size:10px">${basis}</td><td style="color:${col};font-size:11px">${fmt(amt)}</td></tr>`;

  let h='';
  const sfPct = c.loan>0 ? fmtPct(c.sf/c.loan*100) : '—';
  h+=row('PB Service Fee',`${sfPct} × ${fmt(c.loan)}`,c.sf,true);
  h+=sub('New Home Deposit (upfront)','Collected at purchase',c.dep,'var(--accent)');
  h+=sub('Remainder at closing','Collected at refi',Math.max(c.sfRem,0),'var(--accent)');
  h+=row('Client Daily Interest',`${fmt2(c.daily)}/day × ${c.clientDays}d`,c.intRev,true);
  if (c.add>0) h+=row('Additional Costs to Client','Extended hold or penalty',c.add,true);
  if (c.disc>0) h+=row('Discount to Client','Flat reduction',c.disc,false);
  const fbLbl = c.pdBeforePayoff?'FB Paydown':'Payoff';
  // Build FB basis string — show each rate segment if multiple apply
  const fbBasis = c.fbSplit.segments.length > 1
    ? c.fbSplit.segments.map(s => `${s.rate}%/yr×${s.d}d`).join(' + ') + ` × ${fmt(c.locAmt)} (LOC→${fbLbl})`
    : `${c.fbRate}%/yr × ${c.fbDays}d × ${fmt(c.locAmt)} (LOC→${fbLbl})`;
  h+=row(`First Bank LOC Interest (${fmtPct(c.locPct)} of loan)`, fbBasis, c.fbCost, false, c.tailDays>0&&!c.pdBeforePayoff?`Incl. ${c.tailDays}d tail after Refi`:null);
  const mP1Lbl = c.pdBeforeRefi?'FB Paydown':'Refi';
  const mRateLbl = c.mRate === 'split'
    ? (c.m1Split.segments||[]).map(s=>`${parseFloat(s.rate).toFixed(4)}%×${s.d}d`).join(' + ')
    : `${typeof c.mRate === 'number' ? c.mRate.toFixed(4) : c.mRate}%`;
  const m1BasisBase = `${fmt(c.mAmt)} (Purchase→${mP1Lbl})`;
  const m1Basis = (c.m1Split.segments||[]).length > 1
    ? (c.m1Split.segments.map(s=>`${parseFloat(s.rate).toFixed(4)}%/yr×${s.d}d`).join(' + ')) + ` × ${fmt(c.mAmt)}`
    : `${mRateLbl}/yr × ${c.mP1Days}d × ${m1BasisBase}`;
  h+=row(`Mezzanine Interest — Phase 1 (${fmtPct(c.mPct)} of loan)`, m1Basis, c.mC1, false);

  if (c.pdBeforeRefi && c.mP2Days>0) {
    const m2Basis = (c.m2Split.segments||[]).length > 1
      ? (c.m2Split.segments.map(s=>`${parseFloat(s.rate).toFixed(4)}%/yr×${s.d}d`).join(' + ')) + ` × ${fmt(c.loan)}`
      : `${mRateLbl}/yr × ${c.mP2Days}d × ${fmt(c.loan)} (Paydown→Refi)`;
    h+=row(`Mezzanine Interest — Phase 2 (100% of loan)`, m2Basis, c.mC2, false, 'First Bank paid off — full loan at Mezz rate');
  }
  if (c.brk>0) h+=row('Broker Partner Revenue Share','Flat payout',c.brk,false);
  if (c.lo>0)  h+=row('Loan Officer Revenue Share','Flat payout',c.lo,false);
  h+=`<tr class="total-row"><td colspan="3" style="color:var(--label)">Contribution <span class="badge badge-neutral">${fmtPct(c.margin)} margin</span></td><td style="color:${c.profit>=0?'var(--accent2)':'var(--danger)'}">${fmt(c.profit)}</td></tr>`;
  tb.innerHTML = h;
}

          <label style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--label);cursor:pointer;white-space:nowrap">
            <input type="checkbox" ${d.mezzRateOverride?'checked':''} onchange="toggleMezzOverride('${id}',this.checked)" style="width:auto;padding:0"> Override
          </label>
        </div>
        <div class="field-note" id="mezzRateNote_${id}">${
          d.mezzRateOverride ? 'Manual override active'
          : !d.purchaseDate ? '⚡ Auto-set once Cash Purchase Date is entered'
          : `⚡ ${mezzRateOnDate(d.purchaseDate).toFixed(4)}% from schedule (splits across tiers if deal spans rate changes)`
        }</div>
      </div>
      <div class="field"></div>
      ${fi('brokerShare','Broker Partner Revenue Share',d.brokerShare||'','number','$','','Flat payout (if applicable).',false)}
      ${fi('loShare','Loan Officer Revenue Share',d.loShare||'','number','$','','Flat payout (if applicable).',false)}
    </div>
  </div>

  <!-- DEAL INTELLIGENCE -->
  <div class="intel-card" id="intel_${id}"></div>

  </div>`;

  renderBD(id, c, d);
  renderIntel(id);
}


// ── DEAL INTELLIGENCE ─────────────────────────────────────
function getState(addr) {
  if (!addr) return null;
  const m = addr.match(/,\s*([A-Z]{2})[,\s\d]/);
  if (m) return m[1];
  const m2 = addr.match(/\b([A-Z]{2})\s*\d{5}/);
  if (m2) return m2[1];
  return null;
}
function getProgram(name) {
  return (name||'').split(' - ')[0].trim();
}

function computeAtDays(d, holdDays) {
  // Simulate P&L at a hypothetical hold period using date-aware mezzSplit
  const loan = d.loanAmount || 0;
  const locPct = d.locSplitPct || 80, mPct = d.mezzSplitPct || 20;
  const locAmt = loan * locPct / 100, mAmt = loan * mPct / 100;
  const mOvr = d.mezzRateOverride || false;
  const mOvrRate = d.mezzRateOverride ? (d.mezzRate||12) : mezzRateOnDate(d.purchaseDate||'');
  const sf = d.serviceFeeTotal || 0;
  const daily = d.clientDaily || 0;
  const disc = d.clientDiscount || 0, add = d.additionalClientCosts || 0;
  const brk = d.brokerShare || 0, lo = d.loShare || 0;
  const pur = d.purchaseDate || '';

  // Approximate end dates based on holdDays from LOC Advance (purchase - 1 day)
  const locStart = pur ? addD(pur, -1) : '';
  const hypothRefi = locStart ? addD(locStart, holdDays) : '';

  // Client days = purchase → hypothetical refi
  const clientDays = pur && hypothRefi ? Math.max(0, days(pur, hypothRefi)) : Math.max(0, holdDays - 1);
  const intRev  = daily * clientDays;
  const totRev  = sf + intRev + add - disc;

  // First Bank: LOC → min(hypothRefi, paydown at day 180)
  const paydownDate = locStart ? addD(locStart, 180) : '';
  const fbEndDate   = paydownDate && hypothRefi && paydownDate < hypothRefi ? paydownDate : hypothRefi;
  const fbCost      = locStart && fbEndDate ? fbRateSplit(locAmt, locStart, fbEndDate).cost : 0;

  // Mezz Phase 1: 20% tranche, purchase → min(hypothRefi, paydown)
  const mP1End = paydownDate && hypothRefi && paydownDate < hypothRefi ? paydownDate : hypothRefi;
  const m1 = pur && mP1End ? mezzSplit(mAmt, pur, mP1End, mOvr, mOvrRate) : { cost:0 };

  // Mezz Phase 2: 100%, day after paydown → hypothRefi (if paydown < hypothRefi)
  const mC2 = (paydownDate && hypothRefi && paydownDate < hypothRefi)
    ? mezzSplit(loan, addD(paydownDate,1), hypothRefi, mOvr, mOvrRate).cost : 0;

  const mCost   = m1.cost + mC2;
  const totCost = fbCost + mCost + brk + lo;
  const profit  = totRev - totCost;
  const margin  = totRev > 0 ? profit/totRev*100 : 0;
  return { profit, margin, totRev, totCost, fbCost, mCost, clientDays };
}

function renderIntel(id) {
  const d = deals.find(x => x.id === id);
  const el = document.getElementById(`intel_${id}`);
  if (!d || !el) return;

  const c = compute(d);
  const loan = d.loanAmount || 0;
  if (!loan) { el.innerHTML = ''; return; }

  // ── Portfolio benchmarks ──────────────────────────────────
  const all = deals.map(x => compute(x));
  const portAvgProfit  = all.reduce((a,b)=>a+b.profit,0)/all.length;
  const portAvgMargin  = all.reduce((a,b)=>a+b.margin,0)/all.length;
  const portAvgHold    = all.filter(x=>x.totalDays>0).reduce((a,b,_,arr)=>a+b.totalDays/arr.length,0);
  const portAvgYield   = all.filter(x=>isFinite(x.aYield)).reduce((a,b,_,arr)=>a+b.aYield/arr.length,0);

  // State benchmarks
  const st = getState(d.address);
  const stDeals = st ? deals.filter(x => getState(x.address)===st).map(x=>compute(x)) : [];
  const stAvgHold = stDeals.filter(x=>x.totalDays>0).length
    ? stDeals.filter(x=>x.totalDays>0).reduce((a,b,_,arr)=>a+b.totalDays/arr.length,0) : null;
  const stAvgProfit = stDeals.length ? stDeals.reduce((a,b)=>a+b.profit,0)/stDeals.length : null;

  // Program benchmarks
  const prog = getProgram(d.dealName);
  const progDeals = deals.filter(x=>getProgram(x.dealName)===prog).map(x=>compute(x));
  const progAvgMargin = progDeals.length ? progDeals.reduce((a,b)=>a+b.margin,0)/progDeals.length : null;
  const progAvgProfit = progDeals.length ? progDeals.reduce((a,b)=>a+b.profit,0)/progDeals.length : null;

  // ── Break-even calculation ────────────────────────────────
  // Find the day where profit = 0 by binary search
  let beDay = null;
  const sf = d.serviceFeeTotal || 0;
  const daily = d.clientDaily || 0;
  const brk = d.brokerShare || 0, lo = d.loShare || 0;
  const locAmt_ = loan * (d.locSplitPct||80)/100;
  const mAmt_   = loan * (d.mezzSplitPct||20)/100;
  const mOvr_   = d.mezzRateOverride || false, mOvrRate_ = d.mezzRate || 12;
  const locStart_ = d.purchaseDate ? addD(d.purchaseDate, -1) : '';
  const fixedRev  = sf + (d.additionalClientCosts||0) - (d.clientDiscount||0);
  const fixedCost = brk + lo;
  // Net daily spread for display: FB rate at LOC start date
  const fbRateAtStart = fbRateOnDate(locStart_);
  const fbDailyCost   = locAmt_ * (fbRateAtStart/100) / 365;
  const mRate_display = mOvr_ ? mOvrRate_ : mezzRateOnDate(d.purchaseDate||'');
  const mDailyCost1   = mAmt_   * (mRate_display/100) / 365;
  for (let day = 1; day <= 400; day++) {
    const clientD = Math.max(0, day - 1);
    const intRev  = daily * clientD;
    const totRev  = fixedRev + intRev;
    // FB cost up to day 180
    const fbD    = Math.min(day, 180);
    const hypFbEnd = locStart_ ? addD(locStart_, fbD) : '';
    const fbCostD = locStart_ && hypFbEnd ? fbRateSplit(locAmt_, locStart_, hypFbEnd).cost : 0;
    // Mezz Phase 1: 20% tranche, clientD days (capped at paydown 180)
    const mP1D    = Math.min(clientD, 180);
    const hypRefi1 = locStart_ ? addD(locStart_, clientD) : '';
    const mC1D    = locStart_ && hypRefi1 && mP1D > 0
      ? mezzSplit(mAmt_, d.purchaseDate, hypRefi1, mOvr_, mOvrRate_).cost : 0;
    // Mezz Phase 2: 100%, days beyond paydown
    const mP2D    = Math.max(0, clientD - 180);
    const hypP2Start = locStart_ ? addD(addD(locStart_, 180), 1) : '';
    const hypRefi2   = locStart_ ? addD(locStart_, clientD) : '';
    const mC2D    = (mP2D > 0 && hypP2Start && hypRefi2)
      ? mezzSplit(loan, hypP2Start, hypRefi2, mOvr_, mOvrRate_).cost : 0;
    const totCost = fixedCost + fbCostD + mC1D + mC2D;
    if (totRev - totCost >= 0 && beDay === null) {}
    if (totRev - totCost < 0 && beDay === null) { beDay = day; break; }
  }

  // ── Sensitivity scenarios ─────────────────────────────────
  const scenarioDays = [30, 60, 90, 120, 150, 180, 210, 240];
  const actualDays = c.totalDays;
  const maxAbsProfit = Math.max(...scenarioDays.map(h => Math.abs(computeAtDays(d,h).profit)), 1);

  const sensRows = scenarioDays.map(h => {
    const s = computeAtDays(d, h);
    const isCurrent = actualDays > 0 && Math.abs(h - actualDays) < 5 && h === scenarioDays.reduce((best,v)=>Math.abs(v-actualDays)<Math.abs(best-actualDays)?v:best,scenarioDays[0]);
    const pCls = s.profit>0?'sens-profit-pos':s.profit<0?'sens-profit-neg':'sens-profit-warn';
    const barW = Math.round(Math.abs(s.profit)/maxAbsProfit*80);
    const barCol = s.profit>0?'#34d399':'#f87171';
    const isPaydownWarning = h > 180;
    return `<tr class="${isCurrent?'sens-current':''}">
      <td>${h}d${isCurrent?' ← actual':isPaydownWarning?' ⚠':''}${h===180?' (paydown)':''}</td>
      <td>${fmt(s.totRev)}</td>
      <td>${fmt(s.totCost)}</td>
      <td class="${pCls}"><strong>${fmt(s.profit)}</strong></td>
      <td class="sens-bar-cell">${fmtPct(s.margin)} <span class="sens-bar-mini" style="width:${barW}px;background:${barCol}"></span></td>
    </tr>`;
  }).join('');

  // ── Risk score ────────────────────────────────────────────
  let riskScore = 0;
  const riskFactors = [];

  // Factor 1: Loan size (larger = more exposure)
  if (loan > 1000000) { riskScore += 25; riskFactors.push({color:'#f87171', text:`Large loan (${fmt(loan)}) — high cost exposure`}); }
  else if (loan > 600000) { riskScore += 12; riskFactors.push({color:'#fbbf24', text:`Mid-size loan (${fmt(loan)})`}); }
  else { riskScore += 0; riskFactors.push({color:'#34d399', text:`Loan size within comfortable range`}); }

  // Factor 2: State hold risk
  if (stAvgHold !== null) {
    if (stAvgHold > 120) { riskScore += 30; riskFactors.push({color:'#f87171', text:`${st} avg hold ${Math.round(stAvgHold)}d — slow market risk`}); }
    else if (stAvgHold > 80) { riskScore += 15; riskFactors.push({color:'#fbbf24', text:`${st} avg hold ${Math.round(stAvgHold)}d — moderate market`}); }
    else { riskScore += 0; riskFactors.push({color:'#34d399', text:`${st} avg hold ${Math.round(stAvgHold)}d — fast market`}); }
  } else {
    riskScore += 20; riskFactors.push({color:'#fbbf24', text:`No ${st||'state'} history — market unknown`});
  }

  // Factor 3: Daily interest cover — how well does daily revenue cover daily cost
  const netDailyAtStart = daily - (locAmt_*(fbRate_/100)/365) - (mAmt_*(mRate_/100)/365);
  if (netDailyAtStart < 0) { riskScore += 30; riskFactors.push({color:'#f87171', text:`Daily interest doesn't cover funding cost (${fmt2(netDailyAtStart)}/day net)`}); }
  else if (netDailyAtStart < 30) { riskScore += 15; riskFactors.push({color:'#fbbf24', text:`Thin daily spread (${fmt2(netDailyAtStart)}/day net)`}); }
  else { riskScore += 0; riskFactors.push({color:'#34d399', text:`Healthy daily spread (${fmt2(netDailyAtStart)}/day net)`}); }

  // Factor 4: SF coverage — does service fee alone cover total costs (worst-case: instant refi)
  const instantCosts = fixedCost; // no interest if instant payoff
  const sfCoverageRatio = sf / (c.totCost || 1) * 100;
  if (sf < c.totCost * 0.5) { riskScore += 15; riskFactors.push({color:'#f87171', text:`Service fee covers only ${Math.round(sfCoverageRatio)}% of total costs`}); }
  else if (sf < c.totCost * 0.8) { riskScore += 8; riskFactors.push({color:'#fbbf24', text:`Service fee covers ${Math.round(sfCoverageRatio)}% of total costs`}); }
  else { riskScore += 0; riskFactors.push({color:'#34d399', text:`Service fee strong — covers ${Math.round(sfCoverageRatio)}% of costs`}); }

  riskScore = Math.min(riskScore, 100);
  const riskLabel = riskScore <= 25 ? 'LOW' : riskScore <= 50 ? 'MODERATE' : riskScore <= 75 ? 'ELEVATED' : 'HIGH';
  const riskColor = riskScore <= 25 ? '#34d399' : riskScore <= 50 ? '#fbbf24' : riskScore <= 75 ? '#fb923c' : '#f87171';

  // ── Threshold check ───────────────────────────────────────
  const tProfit = thresholds.minProfit || 0;
  const tMargin = thresholds.minMargin || 0;
  const profitOk = c.profit >= tProfit;
  const marginOk = c.margin >= tMargin;
  const allOk = profitOk && marginOk;
  const alertCls = allOk ? 'alert-pass' : (!profitOk && !marginOk) ? 'alert-fail' : 'alert-warn';
  const alertTxt = allOk ? '✓ Meets thresholds' : `⚠ ${!profitOk?'Below min profit':''}${!profitOk&&!marginOk?' · ':''}${!marginOk?'Below min margin':''}`;

  // Delta helpers
  const delta = (val, avg) => {
    if (avg === null) return '';
    const d = val - avg;
    return d >= 0
      ? `<span class="bench-delta-pos">▲ ${fmt(Math.abs(d))}</span>`
      : `<span class="bench-delta-neg">▼ ${fmt(Math.abs(d))}</span>`;
  };
  const deltaPct = (val, avg) => {
    if (avg === null) return '';
    const d = val - avg;
    return d >= 0
      ? `<span class="bench-delta-pos">▲ ${Math.abs(d).toFixed(1)}pp</span>`
      : `<span class="bench-delta-neg">▼ ${Math.abs(d).toFixed(1)}pp</span>`;
  };

  el.innerHTML = `
    <div class="intel-title">
      <div class="intel-title-left">Deal Intelligence</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);font-family:'Inter',sans-serif">Updates live as you edit deal data</div>
    </div>

    <!-- THRESHOLD + RISK ROW -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.1)">

      <!-- Risk Score -->
      <div>
        <div class="sens-title">Risk Assessment</div>
        <div class="risk-score-wrap" style="margin-bottom:0;padding-bottom:0;border-bottom:none">
          <div class="risk-dial">
            <svg viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
              <circle cx="40" cy="40" r="32" fill="none" stroke="${riskColor}" stroke-width="8"
                stroke-dasharray="${2*Math.PI*32}" stroke-dashoffset="${2*Math.PI*32*(1-riskScore/100)}"
                stroke-linecap="round" transform="rotate(-90 40 40)"/>
              <text x="40" y="36" text-anchor="middle" fill="${riskColor}" font-size="14" font-weight="800" font-family="Inter">${riskScore}</text>
              <text x="40" y="48" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Inter" font-weight="600">${riskLabel}</text>
            </svg>
          </div>
          <div class="risk-score-info">
            <div class="risk-factors">
              ${riskFactors.map(f=>`<div class="risk-factor-row"><span class="risk-factor-dot" style="background:${f.color}"></span>${f.text}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- Thresholds -->
      <div>
        <div class="sens-title">Approval Thresholds</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="threshold-label">Min Profit</span>
            <input class="threshold-input" type="number" value="${tProfit}" oninput="thresholds.minProfit=parseFloat(this.value)||0;renderIntel('${id}')">
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="threshold-label">Min Margin %</span>
            <input class="threshold-input" type="number" value="${tMargin}" oninput="thresholds.minMargin=parseFloat(this.value)||0;renderIntel('${id}')">
          </div>
          <div style="margin-top:4px">
            <span class="alert-pill ${alertCls}">${alertTxt}</span>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,0.3);font-family:'Inter',sans-serif;margin-top:2px">
            This deal: ${fmt(c.profit)} profit · ${fmtPct(c.margin)} margin
          </div>
        </div>
      </div>
    </div>

    <!-- BREAK-EVEN -->
    <div class="sens-title">Break-Even Analysis</div>
    <div class="breakeven-wrap" style="margin-bottom:18px">
      <div class="be-box">
        <div class="be-label">Break-Even Day</div>
        <div class="be-val" style="color:${beDay?'#fbbf24':'#34d399'}">${beDay ? `Day ${beDay}` : 'Never'}</div>
        <div class="be-sub">${beDay ? `Profitable through day ${beDay-1}` : 'Deal remains profitable at any hold length'}</div>
      </div>
      <div class="be-box">
        <div class="be-label">Net Daily Spread</div>
        <div class="be-val" style="color:${netDailyAtStart>=0?'#34d399':'#f87171'}">${fmt2(netDailyAtStart)}/day</div>
        <div class="be-sub">Revenue minus funding cost per day</div>
      </div>
      <div class="be-box">
        <div class="be-label">SF Covers Costs Through</div>
        <div class="be-val" style="color:#60a5fa">${sf > 0 && (fbDailyCost+mDailyCost1) > 0 ? Math.round(sf / (fbDailyCost+mDailyCost1)) + 'd' : '—'}</div>
        <div class="be-sub">Days service fee alone covers funding costs</div>
      </div>
    </div>

    <!-- SENSITIVITY TABLE -->
    <div class="sens-title">Hold Period Sensitivity — P&L at Different Hold Lengths</div>
    <div style="overflow-x:auto;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.1)">
      <table class="sens-table">
        <thead><tr><th>Hold Period</th><th>Revenue</th><th>Costs</th><th>Contribution</th><th>Unit Margin</th></tr></thead>
        <tbody>${sensRows}</tbody>
      </table>
      ${beDay ? `<div style="margin-top:8px;font-size:10px;color:#fbbf24;font-family:'Inter',sans-serif">⚠ This deal breaks even at day ${beDay}. ${stAvgHold && stAvgHold > beDay ? `${st} avg hold is ${Math.round(stAvgHold)}d — market risk of reaching break-even.` : ''}</div>` : '<div style="margin-top:8px;font-size:10px;color:#34d399;font-family:\'Inter\',sans-serif">✓ Service fee ensures deal remains profitable regardless of hold period.</div>'}
    </div>

    <!-- BENCHMARKS -->
    <div class="sens-title">Benchmarks — How This Deal Compares</div>
    <div class="bench-grid">
      <div class="bench-box">
        <div class="bench-label">vs. Portfolio Average (${deals.length} deals)</div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Net Profit</span>
          <div class="bench-compare-vals"><span class="bench-this">${fmt(c.profit)}</span><span class="bench-avg">avg ${fmt(portAvgProfit)}</span>${delta(c.profit,portAvgProfit)}</div>
        </div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Gross Margin</span>
          <div class="bench-compare-vals"><span class="bench-this">${fmtPct(c.margin)}</span><span class="bench-avg">avg ${fmtPct(portAvgMargin)}</span>${deltaPct(c.margin,portAvgMargin)}</div>
        </div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Hold Period</span>
          <div class="bench-compare-vals"><span class="bench-this">${c.totalDays>0?c.totalDays+'d':'—'}</span><span class="bench-avg">avg ${Math.round(portAvgHold)}d</span></div>
        </div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Ann. Yield</span>
          <div class="bench-compare-vals"><span class="bench-this">${fmtPct(c.aYield)}</span><span class="bench-avg">avg ${fmtPct(portAvgYield)}</span>${deltaPct(c.aYield,portAvgYield)}</div>
        </div>
      </div>
      <div class="bench-box">
        <div class="bench-label">vs. ${prog} Program (${progDeals.length} deal${progDeals.length!==1?'s':''})</div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Net Profit</span>
          <div class="bench-compare-vals"><span class="bench-this">${fmt(c.profit)}</span><span class="bench-avg">avg ${fmt(progAvgProfit)}</span>${delta(c.profit,progAvgProfit)}</div>
        </div>
        <div class="bench-compare-row">
          <span class="bench-compare-label">Gross Margin</span>
          <div class="bench-compare-vals"><span class="bench-this">${fmtPct(c.margin)}</span><span class="bench-avg">avg ${fmtPct(progAvgMargin)}</span>${deltaPct(c.margin,progAvgMargin)}</div>
        </div>
        ${st ? `
        <div style="border-top:1px solid rgba(255,255,255,0.06);margin:8px 0 8px;padding-top:8px">
          <div class="bench-label" style="margin-bottom:5px">vs. ${st} State Avg (${stDeals.length} deal${stDeals.length!==1?'s':''})</div>
          <div class="bench-compare-row">
            <span class="bench-compare-label">Avg Net Profit</span>
            <div class="bench-compare-vals"><span class="bench-this">${fmt(c.profit)}</span><span class="bench-avg">avg ${fmt(stAvgProfit)}</span>${delta(c.profit,stAvgProfit)}</div>
          </div>
          <div class="bench-compare-row">
            <span class="bench-compare-label">Avg Hold Period</span>
            <div class="bench-compare-vals"><span class="bench-this">${c.totalDays>0?c.totalDays+'d':'—'}</span><span class="bench-avg">avg ${stAvgHold!==null?Math.round(stAvgHold)+'d':'—'}</span></div>
          </div>
        </div>` : ''}
      </div>
    </div>
  `;
}

// ── DATA RESOURCES ───────────────────────────────────────
function showDataResources() {
  setActiveNav('nav-data');
  const dlBtn = document.getElementById('downloadBtn');
  if (dlBtn) dlBtn.style.display = 'none';
  renderDataResources();
}

function renderDataResources() {
  const schedule = [...fbRateSchedule].sort((a, b) => a.from < b.from ? -1 : 1);
  const mezzSchedule = [...mezzRateSchedule].sort((a,b) => a.from < b.from ? -1 : 1);

  const tableRows = schedule.map((tier, i) => {
    const isLast = i === schedule.length - 1;
    const nextFrom = isLast ? null : schedule[i + 1].from;
    const toLabel  = isLast ? 'Current & forward'
      : nextFrom ? formatDateDisplay(addD(nextFrom, -1)) : '—';
    const isActive = isCurrentTier(tier.from, nextFrom);
    return `<tr>
      <td>
        <input class="rate-input" type="date" value="${tier.from}" style="color-scheme:light"
          onchange="updateFbRate(${i}, 'from', this.value)">
      </td>
      <td style="color:var(--muted);font-size:12px;font-family:'Inter',sans-serif">${toLabel}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <input class="rate-input" type="number" value="${tier.rate}" step="0.01" style="width:80px"
            onchange="updateFbRate(${i}, 'rate', parseFloat(this.value))">
          <span style="font-size:12px;color:var(--muted)">%/yr</span>
          ${isActive ? '<span class="rate-badge current-badge">Active</span>' : ''}
        </div>
      </td>
      <td style="color:var(--muted);font-size:11px;font-family:'Inter',sans-serif">${tier.label || ''}</td>
      <td>
        ${schedule.length > 1 ? `<button class="rate-delete-btn" onclick="deleteFbRate(${i})" title="Delete this rate">×</button>` : ''}
      </td>

function formatDateDisplay(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${parseInt(m)}/${parseInt(d)}/${y}`;
}

function isCurrentTier(from, nextFrom) {
  const today = new Date().toISOString().split('T')[0];
  return from <= today && (!nextFrom || today < nextFrom);
}

function updateFbRate(index, field, value) {
  fbRateSchedule[index][field] = value;
  fbRateSchedule.sort((a, b) => a.from < b.from ? -1 : 1);
  renderDataResources();
  // Re-compute all deal sidebars since rates changed
  renderSidebar();
}

function deleteFbRate(index) {
  if (fbRateSchedule.length <= 1) return;
  fbRateSchedule.splice(index, 1);
  renderDataResources();
  renderSidebar();
}

function addFbRate() {
  const from  = document.getElementById('newRateFrom').value;
  const rate  = parseFloat(document.getElementById('newRateVal').value);
  const label = document.getElementById('newRateLabel').value.trim();
  if (!from || isNaN(rate) || rate <= 0) {
    alert('Please enter a valid date and rate.');
    return;
  }
  fbRateSchedule.push({ from, rate, label: label || '' });
  fbRateSchedule.sort((a, b) => a.from < b.from ? -1 : 1);
  renderDataResources();
  renderSidebar();
}

function updateMezzRate(index, field, value) {
  mezzRateSchedule[index][field] = value;
  mezzRateSchedule.sort((a,b) => a.from < b.from ? -1 : 1);
  renderDataResources();
  renderSidebar();
}

function deleteMezzRate(index) {
  if (mezzRateSchedule.length <= 1) return;
  mezzRateSchedule.splice(index, 1);
  renderDataResources();
  renderSidebar();
}

function addMezzRate() {
  const from  = document.getElementById('newMezzFrom').value;
  const rate  = parseFloat(document.getElementById('newMezzVal').value);
  const label = document.getElementById('newMezzLabel').value.trim();
  if (!from || isNaN(rate) || rate <= 0) { alert('Please enter a valid date and rate.'); return; }
  mezzRateSchedule.push({ from, rate, label: label || '' });
  mezzRateSchedule.sort((a,b) => a.from < b.from ? -1 : 1);
  renderDataResources();
  renderSidebar();
}

// ── COMPARE ───────────────────────────────────────────────
function renderCompare(sel) {
  const cx = sel.map(d => ({ d, c: compute(d) }));
  const profits = cx.map(x => x.c.profit);
  const margins = cx.map(x => x.c.margin);
  const yields  = cx.map(x => x.c.aYield);
  const costs   = cx.map(x => x.c.totCost);
  const bProfit = Math.max(...profits), bMargin = Math.max(...margins), bYield = Math.max(...yields), lCost = Math.min(...costs);

  const heads = cx.map(x => `<th><div class="cn">${x.d.dealName}</div><div class="ca">${x.d.address||''}</div></th>`).join('');

  const mr = (lbl, vals, fn, best, isBig=true) => {
    const cells = vals.map(v => {
      const isBest = isBig ? v===best : v===best;
      const cc = v>0?'pc':v<0?'nc':'';
      return `<td class="${cc}${isBest?' best':''}">${fn(v)}</td>`;
    }).join('');
    return `<tr><td>${lbl}</td>${cells}</tr>`;
  };

  document.getElementById('mainContent').innerHTML = `<div class="compare-view">
    <div class="compare-h2">Deal Comparison</div>
    <div class="compare-sub">${sel.length} deals · <a href="#" onclick="exitCmp()" style="color:var(--accent);text-decoration:none">← Back</a></div>
    <div class="compare-wrap"><table class="compare-table">
      <thead><tr><th>Metric</th>${heads}</tr></thead>
      <tbody>
        <tr class="sec-hdr"><td colspan="${sel.length+1}">Deal Info</td></tr>
        <tr><td>Loan Amount</td>${cx.map(x=>`<td>${fmt(x.c.loan)}</td>`).join('')}</tr>
        <tr><td>Hold Period</td>${cx.map(x=>`<td>${x.c.totalDays>0?x.c.totalDays+'d':'—'}</td>`).join('')}</tr>
        <tr class="sec-hdr"><td colspan="${sel.length+1}">Revenue</td></tr>
        ${mr('PB Service Fee', cx.map(x=>x.c.sf), fmt, Math.max(...cx.map(x=>x.c.sf)))}
        ${mr('Client Daily Interest', cx.map(x=>x.c.intRev), fmt, Math.max(...cx.map(x=>x.c.intRev)))}
        ${mr('Total Revenue', cx.map(x=>x.c.totRev), fmt, Math.max(...cx.map(x=>x.c.totRev)))}
        <tr class="sec-hdr"><td colspan="${sel.length+1}">Costs</td></tr>
        ${mr('First Bank LOC Interest', cx.map(x=>x.c.fbCost), fmt, lCost, false)}
        ${mr('Mezzanine Interest', cx.map(x=>x.c.mCost), fmt, lCost, false)}
        ${mr('Total Costs', costs, fmt, lCost, false)}
        <tr class="sec-hdr"><td colspan="${sel.length+1}">Profitability</td></tr>
        ${mr('Contribution', profits, fmt, bProfit)}
        ${mr('Unit Margin', margins, fmtPct, bMargin)}
        ${mr('Daily Spread', cx.map(x=>x.c.dSpread), v=>fmt(v)+'/day', Math.max(...cx.map(x=>x.c.dSpread)))}
        ${mr('Annualized Yield', yields, fmtPct, bYield)}
      </tbody>
    </table></div>
  </div>`;
}

// ── CSV LOAD ──────────────────────────────────────────────
function loadCSV(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = e.target.result.trim().split('\n');
    const hdrs = parseRow(rows[0]).map(h => h.trim().toLowerCase());
    const nd = [];
    for (let i=1;i<rows.length;i++) {
      if (!rows[i].trim()) continue;
      const cols = parseRow(rows[i]);
      const g = k => { const idx=hdrs.indexOf(k); return idx>=0?(cols[idx]||'').trim():''; };
      const pur = parseDt(g('cash purchase date'));
      const loc = pur ? addD(pur,-1) : '';
      nd.push({
        id:'dcsv_'+Date.now()+'_'+i, dealName:g('deal name'), address:g('address'),
        purchasePrice:parseMon(g('purchase price')), loanAmount:parseMon(g('loan amount')),
        clientDaily:parseFloat(g('daily interest charge'))||160,
        locDate:loc, purchaseDate:pur, refiDate:parseDt(g('refi date')), payoffDate:parseDt(g('payoff date')),
        paydownDate:loc?addD(loc,180):'', serviceFeeTotal:parseMon(g('program revenue')),
        depositFee:parseMon(g('program deposit')), firstBankRate:parseFloat(g('first bank loc rate'))||6.5,
        locSplitPct:parseFloat(g('first bank loc spit')||g('first bank loc split'))||80,
        mezzSplitPct:parseFloat(g('mezzanine split'))||20,
        mezzRate:12, mezzRateOverride:false, brokerShare:0, loShare:0, additionalClientCosts:0, clientDiscount:0,
      });
    }
    deals = [...deals, ...nd];
    renderSidebar();
    if (nd.length) selectDeal(nd[0].id);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseRow(row) {
  const r=[]; let cur='', inQ=false;
  for (const ch of row) {
    if (ch==='"') inQ=!inQ;
    else if (ch===','&&!inQ) { r.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  r.push(cur.trim()); return r;
}
