function showStats(){setActiveNav('nav-stats');renderStats();const dlBtn=document.getElementById('downloadBtn');if(dlBtn)dlBtn.style.display='none';}

function getMonthKey(dateStr){if(!dateStr)return null;const d=new Date(dateStr);if(isNaN(d))return null;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function getMonthLabel(key){if(!key)return'—';const[y,m]=key.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+y.slice(2);}

function renderStats(){
  if(!deals.length){document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No deals loaded</div></div>';return;}
  const filtered=getStatsFilteredDeals();
  const all=filtered.map(d=>({d,c:compute(d)}));
  const n=all.length;
  if(!n){document.getElementById('mainContent').innerHTML=`<div class="stats-view"><div style="margin-bottom:4px"><h2 style="font-family:'Inter',sans-serif;font-size:26px;color:var(--navy);font-weight:800">Portfolio Analytics</h2><p style="font-size:12px;color:var(--muted)">${deals.length} deals total</p></div>${renderStatsFilterBar()}<div class="empty-state" style="height:300px"><div class="empty-icon">🔍</div><div class="empty-title">No deals match filters</div></div></div>`;return;}
  const avg=arr=>arr.reduce((a,b)=>a+b,0)/arr.length,sum=arr=>arr.reduce((a,b)=>a+b,0);
  const profits=all.map(x=>x.c.profit),revenues=all.map(x=>x.c.totRev),costs=all.map(x=>x.c.totCost);
  const margins=all.map(x=>x.c.margin),yields=all.map(x=>x.c.aYield),holdDays=all.map(x=>x.c.totalDays).filter(v=>v>0);
  const dSpreads=all.map(x=>x.c.dSpread),loans=all.map(x=>x.c.loan);
  const avgProfit=avg(profits),avgRev=avg(revenues),avgCost=avg(costs),avgMargin=avg(margins);
  const avgYield=avg(yields.filter(y=>isFinite(y))),avgHold=holdDays.length?avg(holdDays):0;
  const avgDSpread=avg(dSpreads),avgLoan=avg(loans),totalProfit=sum(profits),totalRev=sum(revenues);
  const best=all.reduce((a,b)=>b.c.profit>a.c.profit?b:a);
  const fastest=all.filter(x=>x.c.totalDays>0).reduce((a,b)=>b.c.totalDays<a.c.totalDays?b:a,all.filter(x=>x.c.totalDays>0)[0]||all[0]);
  const highestYield=all.filter(x=>isFinite(x.c.aYield)).reduce((a,b)=>b.c.aYield>a.c.aYield?b:a,all.filter(x=>isFinite(x.c.aYield))[0]||all[0]);
  const profitCount=profits.filter(p=>p>0).length;
  const monthMap={};
  all.forEach(x=>{const mk=getMonthKey(x.d.purchaseDate);if(!mk)return;if(!monthMap[mk])monthMap[mk]={deals:0,profit:0,revenue:0,cost:0,margin:[],hold:[],yield:[],dSpread:[]};monthMap[mk].deals++;monthMap[mk].profit+=x.c.profit;monthMap[mk].revenue+=x.c.totRev;monthMap[mk].cost+=x.c.totCost;monthMap[mk].margin.push(x.c.margin);if(x.c.totalDays>0)monthMap[mk].hold.push(x.c.totalDays);if(isFinite(x.c.aYield))monthMap[mk].yield.push(x.c.aYield);if(x.c.totalDays>0&&isFinite(x.c.dSpread))monthMap[mk].dSpread.push(x.c.dSpread);});
  const months=Object.keys(monthMap).sort();
  const stateMap={};
  all.forEach(x=>{const st=getStateFromAddr(x.d.address);if(!stateMap[st])stateMap[st]={deals:0,profit:0,revenue:0,cost:0,hold:[]};stateMap[st].deals++;stateMap[st].profit+=x.c.profit;stateMap[st].revenue+=x.c.totRev;stateMap[st].cost+=x.c.totCost;if(x.c.totalDays>0)stateMap[st].hold.push(x.c.totalDays);});
  const states=Object.keys(stateMap).sort((a,b)=>stateMap[b].profit/stateMap[b].deals-stateMap[a].profit/stateMap[a].deals);
  const programMap={};
  all.forEach(x=>{const prog=(x.d.dealName.split(' - ')[0]||'Unknown').trim();if(!programMap[prog])programMap[prog]={deals:0,profit:0,revenue:0,hold:[]};programMap[prog].deals++;programMap[prog].profit+=x.c.profit;programMap[prog].revenue+=x.c.totRev;if(x.c.totalDays>0)programMap[prog].hold.push(x.c.totalDays);});
  const programs=Object.keys(programMap).sort((a,b)=>programMap[b].profit/programMap[b].deals-programMap[a].profit/programMap[a].deals);
  const buckets={'<$300k':[],'$300k–$500k':[],'$500k–$800k':[],'$800k–$1.2M':[],'>$1.2M':[]};
  all.forEach(x=>{const l=x.c.loan;if(l<300000)buckets['<$300k'].push(x.c.profit);else if(l<500000)buckets['$300k–$500k'].push(x.c.profit);else if(l<800000)buckets['$500k–$800k'].push(x.c.profit);else if(l<1200000)buckets['$800k–$1.2M'].push(x.c.profit);else buckets['>$1.2M'].push(x.c.profit);});
  const holdBuckets={'<30d':[],'30–60d':[],'60–90d':[],'90–120d':[],'>120d':[]};
  all.forEach(x=>{const h=x.c.totalDays;if(!h)return;if(h<30)holdBuckets['<30d'].push(x.c.profit);else if(h<60)holdBuckets['30–60d'].push(x.c.profit);else if(h<90)holdBuckets['60–90d'].push(x.c.profit);else if(h<120)holdBuckets['90–120d'].push(x.c.profit);else holdBuckets['>120d'].push(x.c.profit);});
  const profitColor=v=>v>0?'#059669':'#e8441a';
  const barChart=(items,maxVal,colorFn,labelWidth='90px')=>items.map(([label,val])=>{const pct=maxVal>0?Math.max(0,(val/maxVal)*100):0,color=colorFn(val),showVal=fmt(val);return`<div class="bar-row"><div class="bar-row-label" style="width:${labelWidth}">${label}</div><div class="bar-outer"><div class="bar-inner" style="width:${pct}%;background:${color}">${pct>15?showVal:''}</div></div><div class="bar-val">${pct<=15?showVal:''}</div></div>`;}).join('');
  const mProfits=months.map(mk=>[getMonthLabel(mk),monthMap[mk].profit]),maxMP=Math.max(...mProfits.map(x=>Math.abs(x[1])),1);
  const sBars=states.map(st=>[st,stateMap[st].profit/stateMap[st].deals]),maxSP=Math.max(...sBars.map(x=>Math.abs(x[1])),1);
  const pBars=programs.map(p=>[p.length>18?p.slice(0,16)+'…':p,programMap[p].profit/programMap[p].deals]),maxPP=Math.max(...pBars.map(x=>Math.abs(x[1])),1);
  const lBars=Object.entries(buckets).map(([k,v])=>[k,v.length?v.reduce((a,b)=>a+b,0)/v.length:0]),maxLB=Math.max(...lBars.map(x=>Math.abs(x[1])),1);
  const hBars=Object.entries(holdBuckets).map(([k,v])=>[k,v.length?v.reduce((a,b)=>a+b,0)/v.length:0]),maxHB=Math.max(...hBars.map(x=>Math.abs(x[1])),1);
  const monthTrendRows=months.map(mk=>{const m=monthMap[mk],ap=m.profit/m.deals,am=m.margin.reduce((a,b)=>a+b,0)/m.margin.length,ah=m.hold.length?m.hold.reduce((a,b)=>a+b,0)/m.hold.length:0,ay=m.yield.length?m.yield.reduce((a,b)=>a+b,0)/m.yield.length:0;return`<tr><td>${getMonthLabel(mk)}</td><td>${m.deals}</td><td style="color:${ap>=0?'var(--accent2)':'var(--danger)'}">${fmt(ap)}</td><td>${fmtPct(am)}</td><td>${ah>0?Math.round(ah)+'d':'—'}</td><td style="color:var(--accent)">${fmtPct(ay)}</td><td style="color:${m.profit>=0?'var(--accent2)':'var(--danger)'}">${fmt(m.profit)}</td></tr>`;}).join('');
  const stateRows=states.map(st=>{const s=stateMap[st],ap=s.profit/s.deals,ah=s.hold.length?s.hold.reduce((a,b)=>a+b,0)/s.hold.length:0;return`<tr><td>${st}</td><td>${s.deals}</td><td style="color:${ap>=0?'var(--accent2)':'var(--danger)'}">${fmt(ap)}</td><td>${fmt(s.revenue/s.deals)}</td><td>${fmt(s.profit)}</td><td>${ah>0?Math.round(ah)+'d':'—'}</td></tr>`;}).join('');
  document.getElementById('mainContent').innerHTML=`<div class="stats-view">
    <div style="margin-bottom:4px"><h2 style="font-family:'Inter',sans-serif;font-size:26px;color:var(--navy);margin-bottom:4px;font-weight:800">Portfolio Analytics</h2><p style="font-size:12px;color:var(--muted)">${deals.length} deals total · All calculations live</p></div>
    ${renderStatsFilterBar()}
    <div class="stats-hero">
      <div class="metric"><div class="metric-label">Total Contribution</div><div class="metric-value ${totalProfit>0?'positive':'negative'}">${fmt(totalProfit)}</div><div class="metric-sub">Across ${n} deal${n!==1?'s':''}</div></div>
      <div class="metric"><div class="metric-label">Avg Contribution / Deal</div><div class="metric-value ${avgProfit>0?'positive':'negative'}">${fmt(avgProfit)}</div><div class="metric-sub">${profitCount} of ${n} profitable</div></div>
      <div class="metric"><div class="metric-label">Avg Unit Margin</div><div class="metric-value neutral">${fmtPct(avgMargin)}</div><div class="metric-sub">Revenue − costs / revenue</div></div>
      <div class="metric"><div class="metric-label">Avg Annualized Yield</div><div class="metric-value positive">${fmtPct(avgYield)}</div><div class="metric-sub">Net profit / loan × 365/days</div></div>
    </div>
    <div class="stat-highlight-grid">
      <div class="sh-card"><div class="sh-label">Avg Total Revenue</div><div class="sh-val" style="color:var(--accent2)">${fmt(avgRev)}</div><div class="sh-sub">Per deal</div></div>
      <div class="sh-card"><div class="sh-label">Avg Total Costs</div><div class="sh-val" style="color:var(--danger)">${fmt(avgCost)}</div><div class="sh-sub">Per deal</div></div>
      <div class="sh-card"><div class="sh-label">Avg Daily Spread</div><div class="sh-val" style="color:var(--accent)">${fmt(avgDSpread)}</div><div class="sh-sub">Net profit per hold day</div></div>
      <div class="sh-card"><div class="sh-label">Avg Hold Period</div><div class="sh-val" style="color:var(--warn)">${Math.round(avgHold)}d</div><div class="sh-sub">LOC Advance to Payoff</div></div>
      <div class="sh-card"><div class="sh-label">Avg Loan Amount</div><div class="sh-val" style="color:var(--text)">${fmt(avgLoan)}</div><div class="sh-sub">Per deal</div></div>
      <div class="sh-card"><div class="sh-label">Total Revenue</div><div class="sh-val" style="color:var(--accent2)">${fmt(totalRev)}</div><div class="sh-sub">All deals combined</div></div>
    </div>
    <div class="stats-grid-3" style="margin-bottom:18px">
      <div class="sh-card" style="border-color:rgba(96,239,176,0.2)"><div class="sh-label" style="color:var(--accent2)">🏆 Best Deal</div><div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0">${best.d.dealName.split(' - ').slice(0,2).join(' - ')}</div><div class="sh-val" style="color:var(--accent2);font-size:18px">${fmt(best.c.profit)}</div><div class="sh-sub">${fmtPct(best.c.margin)} margin · ${best.c.totalDays}d hold</div></div>
      <div class="sh-card" style="border-color:rgba(59,130,246,0.2)"><div class="sh-label" style="color:var(--accent)">⚡ Highest Yield</div><div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0">${highestYield.d.dealName.split(' - ').slice(0,2).join(' - ')}</div><div class="sh-val" style="color:var(--accent);font-size:18px">${fmtPct(highestYield.c.aYield)}</div><div class="sh-sub">${fmt(highestYield.c.profit)} profit · ${highestYield.c.totalDays}d hold</div></div>
      <div class="sh-card" style="border-color:rgba(245,158,11,0.2)"><div class="sh-label" style="color:var(--warn)">🚀 Fastest Close</div><div style="font-size:12px;font-weight:600;color:var(--text);margin:4px 0">${fastest.d.dealName.split(' - ').slice(0,2).join(' - ')}</div><div class="sh-val" style="color:var(--warn);font-size:18px">${fastest.c.totalDays}d</div><div class="sh-sub">${fmt(fastest.c.profit)} profit · ${fmtPct(fastest.c.margin)} margin</div></div>
    </div>
    <div class="stats-card" style="margin-bottom:18px"><div class="stats-section-title">Monthly Trends — by Cash Purchase Date</div><div style="overflow-x:auto"><table class="trend-table"><thead><tr><th style="text-align:left">Month</th><th>Deals</th><th>Avg Profit</th><th>Avg Unit Margin</th><th>Avg Hold</th><th>Avg Yield</th><th>Total Contribution</th></tr></thead><tbody>${monthTrendRows}</tbody></table></div></div>
    <div class="stats-card" style="margin-bottom:18px"><div class="stats-section-title">Avg Daily Spread by Purchase Month</div><div id="dsChartWrap" style="position:relative;width:100%;overflow-x:auto"></div></div>
    <div class="stats-grid-2">
      <div class="stats-card"><div class="stats-section-title">Total Contribution by Purchase Month</div><div class="bar-chart">${barChart(mProfits,maxMP,profitColor,'55px')}</div></div>
      <div class="stats-card"><div class="stats-section-title">Avg Net Profit by Hold Period</div><div class="bar-chart">${barChart(hBars,maxHB,profitColor,'65px')}</div></div>
    </div>
    <div class="stats-card" style="margin-bottom:18px"><div class="stats-section-title">Average Net Profit by State</div><div class="stats-grid-2" style="margin-bottom:0"><div><div class="bar-chart">${barChart(sBars,maxSP,profitColor,'32px')}</div></div><div style="overflow-x:auto"><table class="state-table"><thead><tr><th style="text-align:left">State</th><th>Deals</th><th>Avg Profit</th><th>Avg Revenue</th><th>Total Contribution</th><th>Avg Hold</th></tr></thead><tbody>${stateRows}</tbody></table></div></div></div>
    <div class="stats-grid-2">
      <div class="stats-card"><div class="stats-section-title">Avg Net Profit by Program Type</div><div class="bar-chart">${barChart(pBars,maxPP,profitColor,'100px')}</div></div>
      <div class="stats-card"><div class="stats-section-title">Avg Net Profit by Loan Size</div><div class="bar-chart">${barChart(lBars,maxLB,profitColor,'80px')}</div></div>
    </div>
  </div>`;
  setTimeout(()=>drawDailySpreadChart(months,monthMap),0);
}

function drawDailySpreadChart(months,monthMap){
  const wrap=document.getElementById('dsChartWrap');if(!wrap||!months.length)return;
  const pts=months.map(mk=>{const arr=monthMap[mk].dSpread;return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}).filter(v=>v!==null);
  const labels=months.filter(mk=>monthMap[mk].dSpread.length>0).map(mk=>getMonthLabel(mk));
  const n=pts.length;if(n<2){wrap.innerHTML='<div style="padding:20px;font-size:12px;color:var(--muted)">Not enough data.</div>';return;}
  const W=Math.max(wrap.offsetWidth||700,500),H=200,PAD={top:24,right:24,bottom:42,left:62};
  const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const minV=Math.min(...pts,0),maxV=Math.max(...pts)*1.15;
  const yScale=v=>PAD.top+cH-((v-minV)/(maxV-minV))*cH,xScale=i=>PAD.left+(i/(n-1))*cW;
  const xMean=(n-1)/2,yMean=pts.reduce((a,b)=>a+b,0)/n;
  let num=0,den=0;pts.forEach((v,i)=>{num+=(i-xMean)*(v-yMean);den+=(i-xMean)**2;});
  const slope=den>0?num/den:0,intercept=yMean-slope*xMean,trendY=i=>intercept+slope*i;
  let gridLines='',yLabels='';
  for(let t=0;t<=4;t++){const v=minV+(maxV-minV)*t/4,y=yScale(v);gridLines+=`<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#e2e5eb" stroke-width="1" stroke-dasharray="4,3"/>`;yLabels+=`<text x="${PAD.left-8}" y="${y+4}" text-anchor="end" fill="#7a8299" font-size="9" font-family="Inter">${v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+Math.round(v)}</text>`;}
  const areaPath=`M ${xScale(0)},${yScale(Math.max(minV,0))} `+pts.map((v,i)=>`L ${xScale(i)},${yScale(v)}`).join(' ')+` L ${xScale(n-1)},${yScale(Math.max(minV,0))} Z`;
  const linePath=pts.map((v,i)=>`${i===0?'M':'L'} ${xScale(i)},${yScale(v)}`).join(' ');
  const trendPath=`M ${xScale(0)},${yScale(trendY(0))} L ${xScale(n-1)},${yScale(trendY(n-1))}`;
  const trendColor=slope>0?'#059669':'#dc2626';
  let circles='',xLabels='';
  pts.forEach((v,i)=>{circles+=`<circle cx="${xScale(i)}" cy="${yScale(v)}" r="4" fill="${v>=0?'#1a2744':'#dc2626'}" stroke="white" stroke-width="2"><title>${labels[i]}: $${Math.abs(v).toFixed(0)}/day</title></circle>`;if(n<=8||i%2===0||i===n-1)xLabels+=`<text x="${xScale(i)}" y="${H-PAD.bottom+16}" text-anchor="middle" fill="#7a8299" font-size="9" font-family="Inter" transform="rotate(-30,${xScale(i)},${H-PAD.bottom+16})">${labels[i]}</text>`;});
  const trendDelta=trendY(n-1)-trendY(0),trendLabel=(trendDelta>=0?'▲ +':'▼ ')+'$'+Math.abs(trendDelta).toFixed(0)+'/day trend';
  wrap.innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2744" stop-opacity="0.12"/><stop offset="100%" stop-color="#1a2744" stop-opacity="0.01"/></linearGradient></defs>${gridLines}${yLabels}<path d="${areaPath}" fill="url(#areaGrad)"/><path d="${linePath}" fill="none" stroke="#1a2744" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/><path d="${trendPath}" fill="none" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.85"/>${circles}${xLabels}<text x="${xScale(n-1)-4}" y="${yScale(trendY(n-1))-10}" text-anchor="end" fill="${trendColor}" font-size="9" font-family="Inter" font-weight="600">${trendLabel}</text></svg>`;
}

function showDataResources(){setActiveNav('nav-data');const dlBtn=document.getElementById('downloadBtn');if(dlBtn)dlBtn.style.display='none';renderDataResources();}
function formatDateDisplay(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${parseInt(m)}/${parseInt(d)}/${y}`;}
function isCurrentTier(from,nextFrom){const today=new Date().toISOString().split('T')[0];return from<=today&&(!nextFrom||today<nextFrom);}
function renderDataResources(){
  const schedule=[...fbRateSchedule].sort((a,b)=>a.from<b.from?-1:1);
  const mezzSchedule=[...mezzRateSchedule].sort((a,b)=>a.from<b.from?-1:1);
  const fbRows=schedule.map((tier,i)=>{const isLast=i===schedule.length-1,nextFrom=isLast?null:schedule[i+1].from,toLabel=isLast?'Current & forward':formatDateDisplay(addD(nextFrom,-1)),isActive=isCurrentTier(tier.from,nextFrom);return`<tr><td><input class="rate-input" type="date" value="${tier.from}" onchange="updateFbRate(${i},'from',this.value)"></td><td style="color:var(--muted);font-size:12px">${toLabel}</td><td><div style="display:flex;align-items:center;gap:8px"><input class="rate-input" type="number" value="${tier.rate}" step="0.01" style="width:80px" onchange="updateFbRate(${i},'rate',parseFloat(this.value))"><span style="font-size:12px;color:var(--muted)">%/yr</span>${isActive?'<span class="rate-badge current-badge">Active</span>':''}</div></td><td style="color:var(--muted);font-size:11px">${tier.label||''}</td><td>${schedule.length>1?`<button class="rate-delete-btn" onclick="deleteFbRate(${i})">×</button>`:''}</td></tr>`;}).join('');
  const mezzRows=mezzSchedule.map((tier,i)=>{const isLast=i===mezzSchedule.length-1,nextFrom=isLast?null:mezzSchedule[i+1].from,toLabel=isLast?'Current & forward':formatDateDisplay(addD(nextFrom,-1)),isActive=isCurrentTier(tier.from,nextFrom);return`<tr><td><input class="rate-input" type="date" value="${tier.from}" onchange="updateMezzRate(${i},'from',this.value)"></td><td style="color:var(--muted);font-size:12px">${toLabel}</td><td><div style="display:flex;align-items:center;gap:8px"><input class="rate-input" type="number" value="${parseFloat(tier.rate).toFixed(4)}" step="0.0001" style="width:95px" onchange="updateMezzRate(${i},'rate',parseFloat(this.value))"><span style="font-size:12px;color:var(--muted)">%/yr</span>${isActive?'<span class="rate-badge current-badge">Active</span>':''}</div></td><td style="color:var(--muted);font-size:11px">${tier.label||''}</td><td>${mezzSchedule.length>1?`<button class="rate-delete-btn" onclick="deleteMezzRate(${i})">×</button>`:''}</td></tr>`;}).join('');
  document.getElementById('mainContent').innerHTML=`<div class="data-resources-view">
    <h2 class="dr-page-title">Data Resources</h2><p class="dr-page-sub">Reference tables used in calculations. Changes apply immediately to all deals.</p>
    <div class="dr-card"><div class="dr-card-title">First Bank LOC Interest Rate Schedule</div>
      <table class="rate-table"><thead><tr><th>Effective From</th><th>Effective To</th><th>Annual Rate</th><th>Label</th><th></th></tr></thead><tbody>${fbRows}</tbody></table>
      <div class="add-rate-row"><span style="font-size:12px;color:var(--label);font-weight:500">Add rate:</span><input class="rate-input" type="date" id="newRateFrom"><input class="rate-input" type="number" id="newRateVal" placeholder="Rate %" step="0.01" style="width:90px"><input class="rate-input" type="text" id="newRateLabel" placeholder="Label (optional)" style="width:180px"><button onclick="addFbRate()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer">Add Rate</button></div>
    </div>
    <div class="dr-card" style="margin-top:28px"><div class="dr-card-title">Mezzanine Interest Rate Schedule</div>
      <table class="rate-table"><thead><tr><th>Effective From</th><th>Effective To</th><th>Wtd Avg Rate</th><th>Label</th><th></th></tr></thead><tbody>${mezzRows}</tbody></table>
      <div class="add-rate-row"><span style="font-size:12px;color:var(--label);font-weight:500">Add rate:</span><input class="rate-input" type="date" id="newMezzFrom"><input class="rate-input" type="number" id="newMezzVal" placeholder="Rate %" step="0.0001" style="width:90px"><input class="rate-input" type="text" id="newMezzLabel" placeholder="Label (optional)" style="width:180px"><button onclick="addMezzRate()" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer">Add Rate</button></div>
    </div>

// ── CSV / IMPORT ──────────────────────────────────────────
function loadCSV(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=e.target.result.trim().split('\n');
    const hdrs=parseRow(rows[0]).map(h=>h.trim().toLowerCase().replace(/\s+/g,' '));
    const nd=[];
    for(let i=1;i<rows.length;i++){
      if(!rows[i].trim())continue;
      const cols=parseRow(rows[i]);
      const g=k=>{const idx=hdrs.indexOf(k);return idx>=0?(cols[idx]||'').trim():'';};
      const pur=parseDt(g('cash purchase date')),loc=pur?addD(pur,-1):'';
      nd.push({id:'dcsv_'+Date.now()+'_'+i,dealName:g('deal name'),address:g('address'),
        purchasePrice:parseMon(g('purchase price')),loanAmount:parseMon(g('loan amount')),
        clientDaily:parseMon(g('daily interest charge'))||0,
        locDate:loc,purchaseDate:pur,refiDate:parseDt(g('refi date')),payoffDate:parseDt(g('payoff date')),
        paydownDate:loc?addD(loc,180):'',serviceFeeTotal:parseMon(g('program revenue')),
        depositFee:parseMon(g('program deposit')),firstBankRate:parseFloat(g('first bank loc rate'))||6.75,
        locSplitPct:parseFloat(g('first bank loc split')||g('first bank loc spit'))||80,
        mezzSplitPct:parseFloat(g('mezzanine split'))||20,
        mezzRate:12,mezzRateOverride:false,brokerShare:0,loShare:0,additionalClientCosts:0,clientDiscount:0});
    }
    if(!nd.length){event.target.value='';return;}
    _pendingCSVDeals=nd;showImportModal(nd.length);
  };
  reader.readAsText(file);event.target.value='';
}
function dealKey(d){return(d.dealName||'').trim().toLowerCase()+'||'+(d.address||'').trim().toLowerCase();}

        <span style="font-size:20px;flex-shrink:0">➕</span><div><div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px">Add to existing deals</div><div style="font-size:11px;color:var(--muted)">New deals are appended. Duplicates are skipped.</div></div>

  </div>`;

function applyImport(mode){
  const nd=_pendingCSVDeals;_pendingCSVDeals=[];cancelImport();
  if(mode==='replace'){const seen=new Set();deals=nd.filter(d=>{const k=dealKey(d);if(seen.has(k))return false;seen.add(k);return true;});}
  else{const existingKeys=new Set(deals.map(dealKey)),seen=new Set(),toAdd=[];for(const d of nd){const k=dealKey(d);if(existingKeys.has(k)||seen.has(k))continue;seen.add(k);toAdd.push(d);}const skipped=nd.length-toAdd.length;deals=[...deals,...toAdd];if(skipped>0)showToast(`${toAdd.length} deal${toAdd.length!==1?'s':''} added · ${skipped} duplicate${skipped!==1?'s':''} skipped`);}
  renderSidebar();if(deals.length)selectDeal(deals[0].id);
}
function cancelImport(){_pendingCSVDeals=[];const modal=document.getElementById('importModal');if(modal)modal.remove();}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(26,39,68,0.25);pointer-events:none;transition:opacity 0.4s';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},3000);}
function parseRow(row){const r=[];let cur='',inQ=false;for(const ch of row){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}
